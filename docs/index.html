<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎯 Job Tracker — Omri</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f1117;--card:#1e2130;--accent:#00c853;--text:#e0e0e0;--muted:#8a8fa8;--yellow:#ffd600;--red:#f44336;--border:#2a2d3e;--radius:12px}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding-bottom:40px}
    header{background:#131620;border-bottom:1px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:100}
    .header-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
    header h1{font-size:1.25rem;font-weight:700;color:var(--accent)}
    .header-meta{font-size:0.72rem;color:var(--muted);margin-top:2px}
    .filter-bar{display:flex;gap:8px;padding:12px 16px 0;flex-wrap:wrap}
    .filter-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 14px;font-size:.8rem;cursor:pointer;transition:all .15s}
    .filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
    .count-label{font-size:.75rem;color:var(--muted);padding:8px 16px 0}
    .jobs-container{padding:12px 16px 0;display:flex;flex-direction:column;gap:10px}
    .job-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:8px}
    .card-row1{display:flex;align-items:flex-start;gap:12px}
    .score-badge{flex-shrink:0;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:800}
    .score-green{background:rgba(0,200,83,.18);color:var(--accent);border:1.5px solid rgba(0,200,83,.35)}
    .score-yellow{background:rgba(255,214,0,.15);color:var(--yellow);border:1.5px solid rgba(255,214,0,.3)}
    .score-red{background:rgba(244,67,54,.15);color:var(--red);border:1.5px solid rgba(244,67,54,.3)}
    .card-title-block{flex:1;min-width:0}
    .card-company{font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-role{font-size:.82rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-tags{display:flex;flex-wrap:wrap;gap:6px}
    .tag{background:#1a1d2e;border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:.73rem;color:var(--muted)}
    .card-reason{font-size:.8rem;color:var(--muted);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-actions{display:flex;gap:8px;margin-top:2px}
    .btn-view,.btn-copy{flex:1;padding:9px 0;border-radius:8px;font-size:.82rem;font-weight:600;text-align:center;cursor:pointer;border:none;transition:opacity .15s}
    .btn-view{background:rgba(0,200,83,.12);color:var(--accent);border:1px solid rgba(0,200,83,.3);text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px}
    .btn-copy{background:rgba(138,143,168,.12);color:var(--muted);border:1px solid var(--border)}
    .btn-copy.copied{color:var(--accent);border-color:rgba(0,200,83,.4)}
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#2a2d3e;color:var(--text);border:1px solid var(--border);border-radius:24px;padding:10px 20px;font-size:.85rem;z-index:999;transition:transform .3s ease;pointer-events:none}
    #toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <div>
      <h1>🎯 Job Tracker</h1>
      <div class="header-meta">Last updated: Jun 03, 2026</div>
    </div>
    <a href="https://docs.google.com/spreadsheets/d/1i33qr_r_xj_2LkHzg0Hxe5Dh4G_m4T21Xa4WNhQLkjg/edit" target="_blank" style="background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 12px;font-size:.8rem;text-decoration:none">📊 Sheet</a>
  </div>
</header>
<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter(event,'all')">All</button>
  <button class="filter-btn" onclick="setFilter(event,'high')">🟢 8+</button>
  <button class="filter-btn" onclick="setFilter(event,'mid')">🟡 5–7</button>
</div>
<div class="count-label" id="count"></div>
<div class="jobs-container" id="container"></div>
<div id="toast"></div>
<script>
const JOBS=[{"company": "Rapyd", "title": "Revenue Operations Manager", "location": "Tel Aviv, Israel (In-Office)", "url": "https://www.rapyd.net/company/careers/positions/revenue-operations-manager-tel-aviv-israel/", "job_type": "Full-time", "description": "Rapyd, a global fintech/payments platform, seeks a Revenue Operations Manager to power its go-to-market strategy by driving operational efficiency, performance visibility, and actionable insights. The role partners with Sales, Marketing, Finance, and the broader GTM organization. Requires at least 5 years in Revenue/Sales/Customer Operations, strong BI skills with large datasets (Looker preferred), CRM proficiency (Salesforce or HubSpot), KPI tracking, revenue funnel analysis, and process improvement experience within GTM functions.", "fit_score": 9, "score_reason": "Excellent match: 15+ years B2B SaaS RevOps experience directly aligns with fintech expertise, Salesforce/HubSpot proficiency, and GTM operational leadership required. Tel Aviv location is ideal fit within candidate's preferred geography.", "ai_opener": "Omri, I came across Rapyd's Revenue Operations Manager opening and immediately thought of your background—15+ years scaling GTM operations in B2B SaaS with deep fintech experience seems like a perfect match for powering their go-to-market strategy. Your expertise in pipeline forecasting, revenue funnel analysis, and BI-driven insights directly addresses what they're building. Would be worth a conversation about how you could drive operational efficiency across their global sales and marketing organization.", "location_ok": true}, {"company": "Vanta", "title": "Revenue Operations Manager", "location": "Remote", "url": "https://www.indeed.com/q-revenue-operations-l-remote-jobs.html", "job_type": "Full-time", "description": "Vanta is hiring a Revenue Operations Manager to support GTM operations. The role requires 4-6 years of experience in revenue operations, sales operations, or business operations, ideally within a B2B SaaS environment. Responsibilities include managing revenue systems, supporting forecasting and pipeline analysis, ensuring data integrity across the lead-to-revenue lifecycle, and delivering insights on pipeline health, conversion, and revenue performance to support a high-growth security compliance SaaS company.", "fit_score": 8, "score_reason": "Strong alignment with RevOps core competencies (forecasting, pipeline analysis, data integrity, revenue systems) and B2B SaaS background. However, the 4-6 year requirement is significantly below Omri's 15+ year seniority, suggesting potential overqualification concerns or misalignment on career level expectations.", "ai_opener": "Hi there – I noticed Vanta is scaling its RevOps function, and your focus on pipeline health and data integrity across the lead-to-revenue lifecycle caught my attention. With 15+ years building GTM infrastructure in high-growth B2B SaaS (including forecasting frameworks and Salesforce automation), I'd love to explore if this role could benefit from that depth, or if you're building toward something larger in your ops function.", "location_ok": true}, {"company": "You.com", "title": "Head of Revenue Operations", "location": "Remote (Canada / California, USA)", "url": "https://jobgether.com/remote-jobs/revenue-operations", "job_type": "Full-time", "description": "You.com, an AI startup, is hiring a Head of Revenue Operations to design and scale the RevOps function. The senior-level role (5-10 years) emphasizes HubSpot CRM expertise, go-to-market strategy, and forecasting management. Compensation is around $270K. The leader will own revenue forecasting, pipeline analysis, and build the operational backbone supporting predictable revenue growth across sales, marketing, and customer success in a fast-paced AI environment.", "fit_score": 9, "score_reason": "Exceptional match: Head of RevOps role at AI-native startup aligns perfectly with Omri's 15+ years B2B SaaS RevOps expertise, HubSpot mastery, and GTM strategy background. Remote location is approved, seniority level fits, and AI/fintech experience translates directly to You.com's needs.", "ai_opener": "Omri here—I've scaled RevOps functions across multiple B2B SaaS and fintech companies, and You.com's mission to reshape search with AI is compelling. With 15+ years building forecasting engines, pipeline infrastructure, and GTM alignment in fast-growth environments, I'm curious how you're approaching revenue operations as AI adoption accelerates—happy to explore if this Head of RevOps role could be the next chapter.", "location_ok": true}, {"company": "Remote", "title": "GTM Engineer, Revenue Operations", "location": "Remote (Global)", "url": "https://remote.com/openings/6509452003", "job_type": "Full-time", "description": "Remote seeks a GTM Engineer within Revenue Operations to design and maintain a robust GTM tech stack that streamlines outbound prospecting and automates manual workflows. Responsibilities include building reporting and ROI analyses, ensuring data accuracy across GTM systems, developing automated data pipelines, and building scalable pipeline-generation systems using AI-driven insights. Requires extensive experience in a revenue operations or systems role, ideally in B2B SaaS. Base salary range is $40,900–$92,050 USD depending on location.", "fit_score": 9, "score_reason": "Exceptional match across all dimensions: RevOps/GTM core competencies, B2B SaaS expertise, AI-native GTM systems, pipeline forecasting, and data architecture align perfectly with the GTM Engineer role. Remote global position eliminates any location constraints.", "ai_opener": "I've spent 15+ years building revenue operations engines in B2B SaaS, with deep expertise in designing GTM tech stacks that automate prospecting workflows and generate predictable pipeline through AI-driven systems. Your focus on data accuracy, automated pipelines, and ROI reporting resonates with how I've structured RevOps functions to scale efficiently—I'd be excited to explore how my experience optimizing Salesforce/HubSpot ecosystems and building data infrastructure could accelerate your GTM outcomes.", "location_ok": true}, {"company": "Glopal", "title": "Head of Growth Marketing (B2B SaaS)", "location": "Remote (United States)", "url": "https://startup.jobs/head-of-growth-marketing-b2b-saas-remote-glopal-7595192", "job_type": "Full-time", "description": "Glopal, an e-commerce/marketing SaaS company at growth stage, is hiring a Head of Growth Marketing to own demand generation, pipeline creation, and multi-channel campaigns that drive revenue. The senior-level role (5+ years) requires proven B2B SaaS growth or demand-gen leadership, expertise across paid media, SEO, content, and partnerships, plus a data-driven, experimentation-heavy mindset. The position is fully remote within the United States.", "fit_score": 6, "score_reason": "Strong alignment on B2B SaaS, remote work, and data-driven GTM mindset, but the role emphasizes demand-gen/paid media leadership rather than RevOps/operations infrastructure—Omri's core expertise. E-commerce SaaS context is less ideal than pure B2B, and the position skews marketing-heavy versus the revenue operations angle where he'd add most value.", "ai_opener": "Hi [Hiring Manager], I've spent 15+ years scaling B2B SaaS GTM engines, and Glopal's focus on data-driven, multi-channel demand generation caught my eye. While my background is rooted in RevOps and pipeline infrastructure, I've consistently partnered with growth teams to architect the analytics and forecasting frameworks that unlock efficient scaling—something I'd love to explore with your team.", "location_ok": true}, {"company": "efficiently", "title": "Head of Growth Marketing", "location": "Remote", "url": "https://www.indeed.com/viewjob?jk=28af3a5c76af5faa", "job_type": "Full-time", "description": "efficiently, a construction/design collaboration SaaS platform, is hiring a Head of Growth Marketing to build and scale its B2B growth engine. The role owns demand generation, pipeline creation, funnel optimization (lead to activation to champion), and the MarTech stack (Salesforce, Klaviyo, Instantly, GA4, attribution tools). Requires B2B SaaS experience, a proven track record scaling multi-channel campaigns tied to revenue, strong analytical/attribution skills, and comfort in a founder-led environment. Reports directly to the CEO.", "fit_score": 7, "score_reason": "Strong alignment on B2B SaaS, Salesforce, pipeline creation, and founder-led environment. Primary gap: this is a Marketing Operations/Growth Marketing specialist role rather than a full RevOps leadership position—Omri's expertise is deeper in revenue systems, forecasting, and cross-functional ops rather than demand generation and campaign scaling.", "ai_opener": "Hi [Founder], I came across efficiently's focus on construction/design collaboration and your growth engine build. With 15+ years scaling B2B SaaS revenue systems (including Salesforce stack architecture, pipeline forecasting, and multi-channel attribution), I've seen how the right ops foundation unlocks marketing's impact. I'm curious whether you're looking to couple your demand gen plays with tighter revenue ops infrastructure—that's where I typically add the most leverage.", "location_ok": true}, {"company": "GiveCampus", "title": "Marketing Operations Lead", "location": "Remote (USA)", "url": "https://remotive.com/remote/jobs/marketing/marketing-operations-lead-4198648", "job_type": "Full-time", "description": "GiveCampus is hiring its first dedicated Marketing Operations Lead to build and scale the marketing ops function within Revenue Operations. The role owns systems, processes, data integrity, reporting, and performance infrastructure powering the top-of-funnel engine, including the HubSpot platform and Salesforce integration. Responsibilities include a full HubSpot audit/rebuild, campaign execution frameworks, attribution tracking, and implementing AI-powered tools. Requires deep HubSpot expertise, strong understanding of SaaS revenue metrics and funnel analytics, and technical fluency with integrations, data modeling, and APIs.", "fit_score": 9, "score_reason": "Exceptional match for Omri's core RevOps expertise—building first marketing ops function, HubSpot/Salesforce integration, pipeline analytics, and AI-native GTM align perfectly with his 15+ years of B2B SaaS and technical systems background. Remote USA role meets location flexibility requirements.", "ai_opener": "Hi [Hiring Manager], I noticed GiveCampus is building out its first dedicated Marketing Operations function—exactly the kind of greenfield RevOps infrastructure play I've scaled multiple times in B2B SaaS. With deep HubSpot and Salesforce expertise, plus experience implementing AI-powered GTM tools and attribution frameworks, I'd love to discuss how we could accelerate your top-of-funnel ops maturity.", "location_ok": true}, {"company": "Zoom", "title": "Head of Marketing Operations", "location": "Remote", "url": "https://www.indeed.com/q-saas-marketing-l-remote-jobs.html", "job_type": "Full-time", "description": "Zoom is hiring a Head of Marketing Operations to lead and scale global marketing operations teams across campaign operations, marketing technology, data, analytics, and lead lifecycle management. This senior leadership role drives the systems and processes that support demand generation and marketing performance at scale for a global B2B SaaS organization. Strong background in marketing operations leadership, MarTech, and data/analytics within a large SaaS environment is expected.", "fit_score": 7, "score_reason": "Strong alignment on B2B SaaS scale, remote location, and systems/process leadership. However, this is primarily a Marketing Operations role rather than RevOps, so it's a lateral move into a narrower function rather than the broader GTM/Revenue Operations authority Omri typically targets.", "ai_opener": "Omri, Zoom's scaling challenge mirrors what you've likely tackled—taking marketing ops from functional to strategic across global teams. Your RevOps background gives you an edge most MarOps candidates lack: you understand how campaign operations and lead lifecycle connect to actual revenue outcomes. Worth a conversation about whether this marketing-focused scope aligns with where you want to take your career.", "location_ok": true}, {"company": "Checkmarx", "title": "RevOps Business Partner (Maternity Leave Cover)", "location": "Tel Aviv / Ramat Gan, Israel", "url": "https://jobs.secrettelaviv.com/list/category/sales/", "job_type": "Full-time", "description": "Checkmarx, an application security (AppSec) SaaS company, is hiring a RevOps Business Partner on a maternity-leave cover basis based in Tel Aviv/Ramat Gan. The role supports go-to-market and commercial teams with revenue operations processes, reporting, forecasting, and cross-functional alignment across sales, marketing, and customer success. Suited to candidates with revenue/sales operations experience in a B2B SaaS environment who can manage CRM data and operational workflows in a fast-paced cybersecurity company.", "fit_score": 8, "score_reason": "Strong alignment with Omri's core RevOps expertise in B2B SaaS, including forecasting, CRM operations, and GTM cross-functional alignment. Primary concern is the maternity-leave cover nature (temporary role) may not match career trajectory of a senior executive.", "ai_opener": "Omri, I came across your background in RevOps leadership and thought of Checkmarx's RevOps Business Partner role covering maternity leave in Tel Aviv. Given your 15+ years scaling B2B SaaS GTM operations and expertise in pipeline forecasting and CRM optimization, you'd be well-positioned to stabilize their revenue operations during this transition period—and potentially explore a longer-term impact if the role extends.", "location_ok": true}, {"company": "Qualcomm", "title": "Manager, Sales Operations", "location": "Ramat Gan, Israel", "url": "https://il.linkedin.com/jobs/sales-engineer-jobs", "job_type": "Full-time", "description": "Qualcomm is hiring a Manager, Sales Operations based in Ramat Gan, Israel. The role owns tactical sales operations, providing data-driven projections anchored in established KPIs, supporting onboarding and training of sales talent, and partnering with Finance, HR, and Sales to develop incentive and compensation programs. Suited to candidates with sales operations management experience, strong analytical skills, and CRM proficiency in a technology/enterprise environment.", "fit_score": 8, "score_reason": "Strong alignment with RevOps core competencies (sales ops, KPI management, CRM expertise, compensation programs) at an enterprise tech company. Ramat Gan is within acceptable commute range from Tel Aviv area, though slightly outside primary preference zone.", "ai_opener": "Omri, your 15+ years driving GTM strategy and pipeline forecasting in B2B SaaS aligns directly with Qualcomm's Manager, Sales Operations mandate—particularly around building data-driven KPI frameworks and sales compensation architecture. I noticed they're scaling their revenue operations function in Ramat Gan, and your track record optimizing CRM systems and cross-functional finance/sales partnerships could be exactly what they need.", "location_ok": true}, {"company": "Hyperdrive Recruiting (client)", "title": "Senior GTM Engineer", "location": "Remote", "url": "https://www.indeed.com/q-gtm-engineer-saas-jobs.html", "job_type": "Full-time", "description": "A B2B SaaS client of Hyperdrive Recruiting is hiring a Senior GTM Engineer to build the next generation of intelligent go-to-market systems. The role focuses on architecting data-driven, automated GTM infrastructure that transforms ideal customer profiles into predictable revenue using automation, experimentation, and AI/LLM tooling. Requires experience with Python or SQL, API integrations, and automation frameworks, along with strong revenue operations intuition across sales and marketing systems.", "fit_score": 7, "score_reason": "Strong alignment with Omri's RevOps/GTM expertise and AI-native systems focus, but the role's heavy emphasis on Python/SQL technical skills and API engineering may exceed his typical hands-on coding depth as an executive-level RevOps leader.", "ai_opener": "Omri, I noticed your 15+ years building predictable revenue systems in B2B SaaS aligns perfectly with what Hyperdrive's client is building—a Senior GTM Engineer role architecting AI-driven automation across sales and marketing infrastructure. Given your expertise in pipeline forecasting, HubSpot/Salesforce operations, and CAC/LTV optimization, you'd bring crucial revenue operations intuition to their data-driven GTM transformation, especially if you're looking to deepen your hands-on technical involvement with Python/SQL and automation frameworks.", "location_ok": true}];
let currentFilter="all";
function badgeClass(s){return s>=8?"score-green":s>=5?"score-yellow":"score-red";}
function filterVal(s){return s>=8?"high":s>=5?"mid":"low";}
function render(){
  const sorted=[...JOBS].sort((a,b)=>b.fit_score-a.fit_score);
  let v=0;
  document.getElementById("container").innerHTML=sorted.map(j=>{
    const fv=filterVal(j.fit_score);
    const show=currentFilter==="all"||fv===currentFilter;
    if(show)v++;
    return `<div class="job-card" data-filter="${fv}" style="display:${show?"":"none"}">
      <div class="card-row1">
        <div class="score-badge ${badgeClass(j.fit_score)}">${j.fit_score}</div>
        <div class="card-title-block">
          <div class="card-company">${j.company}</div>
          <div class="card-role">${j.title}</div>
        </div>
      </div>
      <div class="card-tags">
        ${j.location?`<span class="tag">📍 ${j.location}</span>`:""}
        ${j.job_type?`<span class="tag">${j.job_type}</span>`:""}
      </div>
      ${j.score_reason?`<div class="card-reason">${j.score_reason}</div>`:""}
      <div class="card-actions">
        <a href="${j.url}" target="_blank" rel="noopener" class="btn-view">View Job ↗</a>
        <button class="btn-copy" onclick="copyOpener(this,${JSON.stringify(j.ai_opener||'')})">Copy Opener 📋</button>
      </div>
    </div>`;
  }).join("");
  document.getElementById("count").textContent=v+" job"+(v!==1?"s":"");
}
function setFilter(e,f){
  currentFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  let v=0;
  document.querySelectorAll(".job-card").forEach(c=>{
    const show=f==="all"||c.dataset.filter===f;
    c.style.display=show?"":"none";
    if(show)v++;
  });
  document.getElementById("count").textContent=v+" job"+(v!==1?"s":"");
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
function copyOpener(btn,text){
  if(!text){showToast("No opener");return;}
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="Copied! ✓";btn.classList.add("copied");showToast("Opener copied!");
    setTimeout(()=>{btn.textContent="Copy Opener 📋";btn.classList.remove("copied");},2000);
  }).catch(()=>showToast("Copy failed"));
}
render();
</script>
</body>
</html>
