<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Tracker — Omri</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f4f6fb;--card:#ffffff;--text:#1a1d2b;--muted:#6b7280;--line:#e6e9f0;
      --accent:#2563eb;--green:#16a34a;--green-bg:#e7f7ee;--amber:#d97706;--amber-bg:#fef4e2;
      --red:#dc2626;--red-bg:#fdeaea;--wa:#25d366;--radius:16px;
      --shadow:0 1px 2px rgba(16,24,40,.04),0 4px 16px rgba(16,24,40,.06);
    }
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;padding-bottom:48px;-webkit-font-smoothing:antialiased}
    header{background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line);padding:16px 18px 12px;position:sticky;top:0;z-index:100}
    .header-top{display:flex;align-items:center;justify-content:space-between;gap:8px;max-width:760px;margin:0 auto}
    header h1{font-size:1.3rem;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
    .header-meta{font-size:.74rem;color:var(--muted);margin-top:3px}
    .sheet-link{background:#fff;border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:8px 12px;font-size:.78rem;text-decoration:none;font-weight:600;white-space:nowrap}
    .wrap{max-width:760px;margin:0 auto}
    .filter-bar{display:flex;gap:8px;padding:14px 18px 0;flex-wrap:wrap}
    .filter-btn{background:#fff;border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:7px 16px;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s}
    .filter-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
    .count-label{font-size:.78rem;color:var(--muted);padding:12px 18px 0;font-weight:600}
    .jobs-container{padding:12px 18px 0;display:flex;flex-direction:column;gap:14px}
    .job-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:12px}
    .card-row1{display:flex;align-items:flex-start;gap:14px}
    .score-badge{flex-shrink:0;width:52px;height:52px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;line-height:1}
    .score-badge .num{font-size:1.45rem}
    .score-badge .lbl{font-size:.52rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:2px;opacity:.75}
    .score-green{background:var(--green-bg);color:var(--green)}
    .score-amber{background:var(--amber-bg);color:var(--amber)}
    .score-red{background:var(--red-bg);color:var(--red)}
    .card-title-block{flex:1;min-width:0}
    .card-company{font-weight:800;font-size:1.05rem;letter-spacing:-.01em}
    .card-role{font-size:.88rem;color:var(--muted);margin-top:1px}
    .card-tags{display:flex;flex-wrap:wrap;gap:6px}
    .tag{background:#f4f6fb;border:1px solid var(--line);border-radius:8px;padding:3px 9px;font-size:.74rem;color:#4b5563;font-weight:500}
    .tag.date{color:var(--accent);background:#eef3ff;border-color:#dbe6ff}
    .card-reason{font-size:.84rem;color:#4b5563;line-height:1.5}
    .contact-box{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:11px 13px;display:flex;flex-direction:column;gap:6px}
    .contact-head{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
    .contact-main{display:flex;align-items:center;gap:10px}
    .avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
    .contact-info{flex:1;min-width:0}
    .contact-name{font-weight:700;font-size:.86rem}
    .contact-title{font-size:.74rem;color:var(--muted)}
    .contact-links{display:flex;gap:8px;flex-wrap:wrap}
    .clink{font-size:.74rem;font-weight:600;text-decoration:none;padding:5px 10px;border-radius:8px;border:1px solid var(--line);background:#fff;color:#374151;display:inline-flex;align-items:center;gap:4px}
    .clink.li{color:#0a66c2}
    .clink.em{color:var(--accent)}
    .card-actions{display:flex;gap:8px;margin-top:2px;flex-wrap:wrap}
    .btn{flex:1;min-width:90px;padding:11px 8px;border-radius:11px;font-size:.83rem;font-weight:700;text-align:center;cursor:pointer;border:1px solid var(--line);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;text-decoration:none}
    .btn-view{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn-copy{background:#fff;color:#374151}
    .btn-copy.copied{color:var(--green);border-color:var(--green)}
    .btn-wa{background:var(--wa);color:#fff;border-color:var(--wa)}
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--text);color:#fff;border-radius:24px;padding:11px 22px;font-size:.86rem;font-weight:600;z-index:999;transition:transform .3s ease;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.2)}
    #toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <div>
      <h1>🎯 Job Tracker</h1>
      <div class="header-meta">Omri Gonen · RevOps / GTM · Updated Jun 03, 2026</div>
    </div>
    <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1i33qr_r_xj_2LkHzg0Hxe5Dh4G_m4T21Xa4WNhQLkjg/edit" target="_blank">📊 Sheet</a>
  </div>
</header>
<div class="wrap">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter(event,'all')">All</button>
    <button class="filter-btn" onclick="setFilter(event,'high')">🟢 8+</button>
    <button class="filter-btn" onclick="setFilter(event,'mid')">🟡 5–7</button>
  </div>
  <div class="count-label" id="count"></div>
  <div class="jobs-container" id="container"></div>
</div>
<div id="toast"></div>
<script>
const JOBS=[{"company": "Finout", "title": "Head of Revenue Operations", "location": "Tel Aviv / New York (Hybrid)", "url": "https://www.builtinnyc.com/job/head-revenue-operations/8178347", "job_type": "Full-time", "description": "Reporting to the CRO, this hands-on leadership role builds and scales the operational backbone of Finout's GTM engine as the cloud-cost company enters its 2026 growth phase. Requires 7+ years in Revenue Operations, Sales Ops, or Strategy within high-growth B2B SaaS, experience scaling RevOps beyond $30M+ ARR, deep Salesforce administration and revenue analytics expertise, and strong cross-functional leadership across Sales, Marketing, Finance, and HR. A leader-doer who can own executive strategy while building flows, dashboards, and data models, and collaborate across time zones with the Tel Aviv HQ.", "fit_score": 9, "score_reason": "Omri is a perfect match for this Head of RevOps role—15+ years in B2B SaaS far exceeds the 7+ year requirement, with proven expertise in scaling RevOps, Salesforce administration, pipeline forecasting, and cross-functional leadership. The fintech/cloud-native focus aligns precisely with Finout's domain, and the Tel Aviv/NY hybrid structure matches his location preferences.", "ai_opener": "Hi [Hiring Manager], I've followed Finout's growth as a fintech operations leader managing cloud-cost efficiency—a vertical I know well from scaling RevOps at multiple B2B SaaS companies through hypergrowth phases. Your Head of RevOps role caught my attention because building the operational backbone for a $30M+ ARR transition into 2026 growth is exactly the hands-on leadership challenge I've solved repeatedly, and I'm particularly interested in how you're using revenue analytics to drive unit economics in the cloud-cost space.", "location_ok": true, "contact": null}, {"company": "Gong.io", "title": "RevOps Manager, Territory Strategy & Operations", "location": "Remote (US) / Global teams incl. Israel", "url": "https://job-boards.greenhouse.io/gongio/jobs/4668642006", "job_type": "Full-time", "description": "This RevOps Manager redesigns territory models and processes for global scalability, partnering with Sales leadership, Strategy, and Finance to optimize territory compositions and align with headcount plans. Responsibilities include whitespace analysis, coverage recommendations, and maintaining accurate territory mapping in CRM and territory management tools. Requires deep understanding of B2B SaaS GTM models, sales territories, and segmentation strategies, plus strong analytical skills in Excel, SQL, and BI tools (Tableau, Retool), and proficiency with Salesforce and tools like Fullcast, Pigment, or Anaplan. Salary range $149,000–$175,000 USD.", "fit_score": 9, "score_reason": "Exceptional match: Senior RevOps executive with 15+ years B2B SaaS experience directly aligns with territory strategy, GTM optimization, and Salesforce proficiency requirements. Remote global role with Israel team presence perfectly fits location preferences and skill set.", "ai_opener": "Hi [Hiring Manager], I've spent 15+ years optimizing GTM engines for B2B SaaS companies—from territory modeling and pipeline forecasting to scaling sales operations across global teams. Your RevOps Manager role redesigning territory strategy at Gong resonates deeply with my background in building scalable sales models; I'd love to discuss how I can help you drive territory optimization and headcount alignment across your expanding revenue organization.", "location_ok": true, "contact": null}, {"company": "Remote (remote.com)", "title": "GTM Engineer, Revenue Operations", "location": "Remote (Global)", "url": "https://remote.com/openings/6509452003", "job_type": "Full-time", "description": "This GTM Engineer designs and maintains a robust GTM tech stack to streamline outbound prospecting and minimize manual effort, implementing automated workflows to boost efficiency and scalability. Responsibilities include building automated data pipelines, creating Ideal Customer Profiles, developing reporting and ROI analyses, and ensuring data integrity across GTM systems. The role works cross-functionally with Sales, Revenue Operations, and Technology teams, leveraging AI-driven insights for pipeline generation. Requires extensive experience in a revenue operations or systems role, ideally in B2B SaaS. Reports to Director, Revenue Systems & Processes. Base salary $40,900–$92,050 USD.", "fit_score": 8, "score_reason": "Strong alignment with GTM Engineer title, RevOps focus, B2B SaaS requirement, and AI-driven pipeline generation—core competencies for a 15+ year RevOps executive. Salary range is slightly below market for this seniority level, but role's emphasis on systems design and automation directly matches expertise.", "ai_opener": "I noticed remote.com is building out GTM automation and data pipeline infrastructure—exactly the kind of revenue systems work I've spent 15+ years architecting at scale. With my background designing Salesforce/HubSpot ecosystems and building ICP-driven prospecting workflows for B2B SaaS, I'm curious whether you're looking for someone who can hit the ground running on your tech stack while also leveling up the cross-functional GTM strategy.", "location_ok": true, "contact": null}, {"company": "Meisterlabs (MeisterTask)", "title": "GTM Engineer", "location": "Remote / Europe", "url": "https://www.meistertask.com/pages/jobs/gtm-engineer", "job_type": "Full-time", "description": "As part of the Revenue Operations team, this GTM Engineer designs and implements automation and AI-powered solutions across Sales, Marketing, Customer Success, and Partnerships to help teams move faster and deliver better experiences. The role involves understanding team workflows, building systems that reduce manual work, improve handoffs, and support scalable growth. Requires 5+ years in technical roles supporting GTM teams in fast-paced B2B SaaS environments, experience building AI-powered solutions with platforms like OpenAI and Claude (enrichment, prospect research, internal copilots), and strong process optimization skills across the GTM funnel.", "fit_score": 9, "score_reason": "Exceptional match: GTM Engineer role directly aligns with Omri's 15+ years RevOps expertise, B2B SaaS background, and pipeline/automation focus. AI-native GTM requirement is a strong differentiator that matches his target profile, though the listing doesn't explicitly mention Salesforce/HubSpot admin depth.", "ai_opener": "Omri here—I've spent 15+ years building RevOps systems that scale GTM teams, and your GTM Engineer role caught my attention because you're solving the exact problem I've been focused on: turning manual, fragmented workflows into AI-powered automation that actually sticks. I've worked extensively with AI enrichment and internal copilots to reduce friction across Sales-CS handoffs, and I'm curious how you're thinking about platform architecture for teams like yours.", "location_ok": true, "contact": null}, {"company": "efficiently", "title": "Head of Growth (Growth Marketing)", "location": "Remote", "url": "https://www.indeed.com/viewjob?jk=28af3a5c76af5faa", "job_type": "Full-time", "description": "efficiently, a construction/design collaboration SaaS platform, is hiring a Head of Growth to build and scale its B2B growth engine, owning demand generation, pipeline creation, and multi-channel campaigns. Responsibilities span growth strategy across paid, organic, and outbound channels, funnel optimization from lead to champion, and managing the MarTech stack (Salesforce, Klaviyo, Instantly, GA4) with dashboards tracking CAC, LTV, and pipeline contribution. Requires proven B2B SaaS experience scaling multi-channel campaigns tied to revenue, strong marketing automation/CRM grasp, and a builder mindset. Reports directly to the CEO.", "fit_score": 7, "score_reason": "Strong alignment on B2B SaaS, MarTech stack expertise (Salesforce, CAC/LTV metrics, pipeline forecasting), and revenue-focused growth strategy. Primary gap: role emphasizes growth marketing/demand generation over RevOps infrastructure—Omri's sweet spot is operationalizing GTM rather than owning campaign execution and paid media strategy.", "ai_opener": "Omri here—impressed by efficiently's approach to construction/design collaboration. Your Head of Growth role caught my attention: the focus on scaling B2B GTM through Salesforce, pipeline metrics, and multi-channel orchestration aligns with my 15+ years optimizing revenue engines in SaaS. I've built demand generation systems that tie CAC/LTV to pipeline forecasting, and I'm curious how you're thinking about the ops-to-marketing bridge as you scale.", "location_ok": true, "contact": null}, {"company": "Fieldguide, Inc.", "title": "Marketing Operations Lead – HubSpot & AI", "location": "Remote (United States)", "url": "https://www.jobleads.com/us/job/marketing-operations-lead-hubspot-ai-for-b2b-saas--united-states--ec8ff8bd3440c1af0f8bc408752e76316", "job_type": "Full-time", "description": "Fieldguide seeks a Marketing Operations Lead to enhance operational efficiency through HubSpot and AI tools. Key responsibilities include building and managing marketing campaigns, emails, and workflows in HubSpot, maintaining lead scoring and routing systems for effective sales handoffs, and ensuring data integrity and compliance within marketing operations. Requires 5+ years of B2B SaaS marketing operations experience, proven HubSpot proficiency at the Enterprise level, working knowledge of HTML, and advanced data analysis skills. The role offers an opportunity to innovate and improve marketing operations using AI-driven approaches.", "fit_score": 7, "score_reason": "Strong technical alignment with HubSpot expertise and B2B SaaS background, but role is Marketing Ops focused rather than full RevOps/GTM strategy where Omri excels. 15+ years experience exceeds requirements, though HTML requirement and pure campaign management may feel narrow for a senior executive.", "ai_opener": "Omri here – I've built RevOps functions at scale across B2B SaaS, including deep HubSpot architecture for complex lead scoring and sales handoff workflows. Seeing Fieldguide's push to integrate AI into marketing ops caught my attention; I've implemented AI-native GTM frameworks that dramatically improved pipeline efficiency and data integrity. Happy to explore how my background in revenue systems could accelerate your marketing operations modernization.", "location_ok": true, "contact": null}, {"company": "saas.group (Crosstalent brand)", "title": "Head of Sales & Marketing (B2B SaaS)", "location": "Remote (Global / work-from-anywhere)", "url": "https://euremotejobs.com/job/head-of-sales-and-marketing-b2b-saas/", "job_type": "Full-time", "description": "saas.group is hiring a Head of Sales & Marketing to lead all commercial activities for Crosstalent, a French Salesforce-based HRIS SaaS brand. The role takes full ownership of the growth engine from top-of-funnel acquisition through conversion, retention, and revenue expansion, building and scaling both Marketing and Sales functions alongside the CEO. Requires 7–10+ years of B2B SaaS commercial experience across Sales and Marketing, a proven track record scaling revenue in SMB/mid-market SaaS, deep understanding of SaaS metrics (ARR/MRR, CAC, LTV, NDR/GDR, churn), and comfort in a fully remote, high-autonomy environment. Salesforce knowledge a plus.", "fit_score": 8, "score_reason": "Strong alignment on B2B SaaS, Salesforce, SaaS metrics expertise, and 15+ years exceeds the 7-10 year requirement. Primary gap: role emphasizes integrated Sales & Marketing leadership rather than pure RevOps/GTM engineering focus, though the revenue operations and pipeline forecasting skills are directly applicable.", "ai_opener": "Hi [Hiring Manager], I noticed Crosstalent is scaling the growth engine for HRIS SaaS and building out both Sales and Marketing functions. With 15+ years scaling B2B SaaS revenue across CAC/LTV optimization, pipeline forecasting, and Salesforce-driven operations, I've built similar commercial engines from the ground up. I'd be interested in exploring how my RevOps and GTM background could accelerate Crosstalent's growth trajectory.", "location_ok": true, "contact": null}];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const NOW=new Date();
let currentFilter="all";
function badgeClass(s){return s>=8?"score-green":s>=5?"score-amber":"score-red";}
function filterVal(s){return s>=8?"high":s>=5?"mid":"low";}
function postedLabel(d){
  if(!d) return "";
  const dt=new Date(d);
  if(isNaN(dt)) return "";
  const days=Math.round((NOW-dt)/86400000);
  let rel = days<=0?"today":days===1?"1 day ago":days+" days ago";
  return MONTHS[dt.getMonth()]+" "+dt.getDate()+" · "+rel;
}
function initials(name){return name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();}
function render(){
  const sorted=[...JOBS].sort((a,b)=>b.fit_score-a.fit_score);
  let v=0;
  document.getElementById("container").innerHTML=sorted.map((j,i)=>{
    const fv=filterVal(j.fit_score);
    const show=currentFilter==="all"||fv===currentFilter;
    if(show)v++;
    const c=j.contact;
    const contactHTML=c?`
      <div class="contact-box">
        <div class="contact-head">👤 Who to contact · via Clay</div>
        <div class="contact-main">
          <div class="avatar">${initials(c.name)}</div>
          <div class="contact-info">
            <div class="contact-name">${c.name}</div>
            <div class="contact-title">${c.title}</div>
          </div>
        </div>
        <div class="contact-links">
          ${c.email?`<a class="clink em" href="mailto:${c.email}">✉️ ${c.email}</a>`:""}
          ${c.linkedin?`<a class="clink li" href="${c.linkedin}" target="_blank" rel="noopener">in LinkedIn</a>`:""}
        </div>
      </div>`:"";
    return `<div class="job-card" data-filter="${fv}" style="display:${show?"":"none"}">
      <div class="card-row1">
        <div class="score-badge ${badgeClass(j.fit_score)}"><span class="num">${j.fit_score}</span><span class="lbl">fit</span></div>
        <div class="card-title-block">
          <div class="card-company">${j.company}</div>
          <div class="card-role">${j.title}</div>
        </div>
      </div>
      <div class="card-tags">
        ${j.posted?`<span class="tag date">🗓️ ${postedLabel(j.posted)}</span>`:""}
        ${j.location?`<span class="tag">📍 ${j.location}</span>`:""}
        ${j.job_type?`<span class="tag">${j.job_type}</span>`:""}
      </div>
      ${j.score_reason?`<div class="card-reason">${j.score_reason}</div>`:""}
      ${contactHTML}
      <div class="card-actions">
        <a href="${j.url}" target="_blank" rel="noopener" class="btn btn-view">View Job ↗</a>
        <button class="btn btn-copy" onclick='copyOpener(this,${i})'>Copy Opener 📋</button>
        <button class="btn btn-wa" onclick='shareWA(${i})'>WhatsApp</button>
      </div>
    </div>`;
  }).join("");
  document.getElementById("count").textContent=v+" job"+(v!==1?"s":"");
  window._sorted=sorted;
}
function setFilter(e,f){
  currentFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  render();
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
function copyOpener(btn,i){
  const j=window._sorted[i];const text=j.ai_opener||"";
  if(!text){showToast("No opener");return;}
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="Copied! ✓";btn.classList.add("copied");showToast("Opener copied!");
    setTimeout(()=>{btn.textContent="Copy Opener 📋";btn.classList.remove("copied");},2000);
  }).catch(()=>showToast("Copy failed"));
}
function shareWA(i){
  const j=window._sorted[i];const c=j.contact;
  let msg=`🎯 *${j.company}* — ${j.title}\n`;
  msg+=`Fit ${j.fit_score}/10 · 📍 ${j.location}\n`;
  if(j.posted) msg+=`Posted: ${postedLabel(j.posted)}\n`;
  if(c) msg+=`Contact: ${c.name}, ${c.title}${c.email?" ("+c.email+")":""}\n`;
  msg+=`\n${j.url}`;
  window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");
}
render();
</script>
</body>
</html>
