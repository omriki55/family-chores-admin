<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎯 Job Tracker — Omri</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f1117;--card:#1e2130;--accent:#00c853;--text:#e0e0e0;--muted:#8a8fa8;--yellow:#ffd600;--red:#f44336;--border:#2a2d3e;--radius:12px}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding-bottom:40px}
    header{background:#131620;border-bottom:1px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:100}
    .header-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
    header h1{font-size:1.25rem;font-weight:700;color:var(--accent)}
    .header-meta{font-size:0.72rem;color:var(--muted);margin-top:2px}
    .filter-bar{display:flex;gap:8px;padding:12px 16px 0;flex-wrap:wrap}
    .filter-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 14px;font-size:.8rem;cursor:pointer;transition:all .15s}
    .filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
    .count-label{font-size:.75rem;color:var(--muted);padding:8px 16px 0}
    .jobs-container{padding:12px 16px 0;display:flex;flex-direction:column;gap:10px}
    .job-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:8px}
    .card-row1{display:flex;align-items:flex-start;gap:12px}
    .score-badge{flex-shrink:0;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:800}
    .score-green{background:rgba(0,200,83,.18);color:var(--accent);border:1.5px solid rgba(0,200,83,.35)}
    .score-yellow{background:rgba(255,214,0,.15);color:var(--yellow);border:1.5px solid rgba(255,214,0,.3)}
    .score-red{background:rgba(244,67,54,.15);color:var(--red);border:1.5px solid rgba(244,67,54,.3)}
    .card-title-block{flex:1;min-width:0}
    .card-company{font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-role{font-size:.82rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-tags{display:flex;flex-wrap:wrap;gap:6px}
    .tag{background:#1a1d2e;border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:.73rem;color:var(--muted)}
    .card-reason{font-size:.8rem;color:var(--muted);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-actions{display:flex;gap:8px;margin-top:2px}
    .btn-view,.btn-copy{flex:1;padding:9px 0;border-radius:8px;font-size:.82rem;font-weight:600;text-align:center;cursor:pointer;border:none;transition:opacity .15s}
    .btn-view{background:rgba(0,200,83,.12);color:var(--accent);border:1px solid rgba(0,200,83,.3);text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px}
    .btn-copy{background:rgba(138,143,168,.12);color:var(--muted);border:1px solid var(--border)}
    .btn-copy.copied{color:var(--accent);border-color:rgba(0,200,83,.4)}
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#2a2d3e;color:var(--text);border:1px solid var(--border);border-radius:24px;padding:10px 20px;font-size:.85rem;z-index:999;transition:transform .3s ease;pointer-events:none}
    #toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <div>
      <h1>🎯 Job Tracker</h1>
      <div class="header-meta">Last updated: Jun 03, 2026</div>
    </div>
    <a href="https://docs.google.com/spreadsheets/d/1i33qr_r_xj_2LkHzg0Hxe5Dh4G_m4T21Xa4WNhQLkjg/edit" target="_blank" style="background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 12px;font-size:.8rem;text-decoration:none">📊 Sheet</a>
  </div>
</header>
<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter(event,'all')">All</button>
  <button class="filter-btn" onclick="setFilter(event,'high')">🟢 8+</button>
  <button class="filter-btn" onclick="setFilter(event,'mid')">🟡 5–7</button>
</div>
<div class="count-label" id="count"></div>
<div class="jobs-container" id="container"></div>
<div id="toast"></div>
<script>
const JOBS=[{"company": "Finout", "title": "Head of Revenue Operations", "location": "Tel Aviv / New York (Hybrid)", "url": "https://www.builtinnyc.com/job/head-revenue-operations/8178347", "job_type": "Full-time", "description": "Reporting to the CRO, this hands-on leadership role builds and scales the operational backbone of Finout's GTM engine as the cloud-cost company enters its 2026 growth phase. Requires 7+ years in Revenue Operations, Sales Ops, or Strategy within high-growth B2B SaaS, experience scaling RevOps beyond $30M+ ARR, deep Salesforce administration and revenue analytics expertise, and strong cross-functional leadership across Sales, Marketing, Finance, and HR. A leader-doer who can own executive strategy while building flows, dashboards, and data models, and collaborate across time zones with the Tel Aviv HQ.", "fit_score": 9, "score_reason": "Omri is a perfect match: 15+ years B2B SaaS RevOps experience exceeds the 7+ requirement, Fintech background aligns with cloud-cost domain expertise, and his senior GTM leadership directly matches scaling beyond $30M ARR with Salesforce mastery. Tel Aviv hybrid role is in his primary location preference.", "ai_opener": "Omri, I came across Finout's Head of Revenue Operations role and your background immediately stood out—scaling RevOps infrastructure through high-growth phases in B2B SaaS is exactly what Finout needs as you hit 2026 expansion. Your Fintech and GTM strategy experience translates directly to building the operational backbone for a cloud-cost platform, and the Tel Aviv / NY hybrid structure seems built for someone with your global execution style.", "location_ok": true}, {"company": "Gong.io", "title": "RevOps Manager, Territory Strategy & Operations", "location": "Remote (US) / Global teams incl. Israel", "url": "https://job-boards.greenhouse.io/gongio/jobs/4668642006", "job_type": "Full-time", "description": "This RevOps Manager redesigns territory models and processes for global scalability, partnering with Sales leadership, Strategy, and Finance to optimize territory compositions and align with headcount plans. Responsibilities include whitespace analysis, coverage recommendations, and maintaining accurate territory mapping in CRM and territory management tools. Requires deep understanding of B2B SaaS GTM models, sales territories, and segmentation strategies, plus strong analytical skills in Excel, SQL, and BI tools (Tableau, Retool), and proficiency with Salesforce and tools like Fullcast, Pigment, or Anaplan. Salary range $149,000–$175,000 USD.", "fit_score": 8, "score_reason": "Omri's 15+ years of B2B SaaS RevOps expertise directly aligns with Gong's need for territory strategy optimization and GTM scaling. Strong match on Salesforce proficiency, analytical skills, and pipeline forecasting background, though specific territory management tool experience (Fullcast/Pigment) would strengthen candidacy.", "ai_opener": "Omri here—I've spent 15+ years building scalable RevOps functions in B2B SaaS, and I've noticed Gong is expanding territory strategy globally. I've redesigned territory models and sales segmentation for high-growth companies facing similar scaling challenges, and I'm particularly drawn to how you're thinking about whitespace analysis and headcount alignment. I'd love to explore how my GTM ops background could help optimize Gong's territory composition.", "location_ok": true}, {"company": "Remote (remote.com)", "title": "GTM Engineer, Revenue Operations", "location": "Remote (Global)", "url": "https://remote.com/openings/6509452003", "job_type": "Full-time", "description": "This GTM Engineer designs and maintains a robust GTM tech stack to streamline outbound prospecting and minimize manual effort, implementing automated workflows to boost efficiency and scalability. Responsibilities include building automated data pipelines, creating Ideal Customer Profiles, developing reporting and ROI analyses, and ensuring data integrity across GTM systems. The role works cross-functionally with Sales, Revenue Operations, and Technology teams, leveraging AI-driven insights for pipeline generation. Requires extensive experience in a revenue operations or systems role, ideally in B2B SaaS. Reports to Director, Revenue Systems & Processes. Base salary $40,900–$92,050 USD.", "fit_score": 8, "score_reason": "Excellent alignment with Omri's core RevOps expertise, GTM tech stack design, and B2B SaaS background. The AI-driven pipeline generation and automated workflows match his strengths, though the salary range is below typical senior executive compensation.", "ai_opener": "I noticed remote.com is building out their GTM tech stack with a focus on AI-driven pipeline generation and automation—exactly the kind of scalable revenue systems work I've spent 15+ years perfecting in B2B SaaS. With my background designing end-to-end RevOps infrastructure and data pipelines across multiple platforms, I'd be interested in exploring how I could help streamline your outbound prospecting and reporting infrastructure.", "location_ok": true}, {"company": "Meisterlabs (MeisterTask)", "title": "GTM Engineer", "location": "Remote / Europe", "url": "https://www.meistertask.com/pages/jobs/gtm-engineer", "job_type": "Full-time", "description": "As part of the Revenue Operations team, this GTM Engineer designs and implements automation and AI-powered solutions across Sales, Marketing, Customer Success, and Partnerships to help teams move faster and deliver better experiences. The role involves understanding team workflows, building systems that reduce manual work, improve handoffs, and support scalable growth. Requires 5+ years in technical roles supporting GTM teams in fast-paced B2B SaaS environments, experience building AI-powered solutions with platforms like OpenAI and Claude (enrichment, prospect research, internal copilots), and strong process optimization skills across the GTM funnel.", "fit_score": 8, "score_reason": "Excellent match: GTM Engineer role aligns perfectly with Omri's RevOps expertise, B2B SaaS background, and AI-native GTM focus. Remote Europe location is acceptable, and the AI-powered automation/workflow optimization directly leverages his 15+ years of pipeline forecasting and process optimization skills.", "ai_opener": "Omri here—I've spent 15+ years building RevOps and GTM systems for B2B SaaS, and your GTM Engineer role caught my attention because it's exactly where the market is moving: AI-powered automation across Sales, Marketing, and CS workflows. I've built similar systems using OpenAI and Claude for prospect enrichment and internal copilots, and I'm particularly interested in how Meisterlabs is approaching handoff optimization and scalable growth automation.", "location_ok": true}, {"company": "efficiently", "title": "Head of Growth (Growth Marketing)", "location": "Remote", "url": "https://www.indeed.com/viewjob?jk=28af3a5c76af5faa", "job_type": "Full-time", "description": "efficiently, a construction/design collaboration SaaS platform, is hiring a Head of Growth to build and scale its B2B growth engine, owning demand generation, pipeline creation, and multi-channel campaigns. Responsibilities span growth strategy across paid, organic, and outbound channels, funnel optimization from lead to champion, and managing the MarTech stack (Salesforce, Klaviyo, Instantly, GA4) with dashboards tracking CAC, LTV, and pipeline contribution. Requires proven B2B SaaS experience scaling multi-channel campaigns tied to revenue, strong marketing automation/CRM grasp, and a builder mindset. Reports directly to the CEO.", "fit_score": 7, "score_reason": "Strong alignment on B2B SaaS, Salesforce proficiency, CAC/LTV metrics, and pipeline focus, but this is primarily a growth marketing role emphasizing paid/organic demand gen rather than core RevOps operations—a lateral move rather than ideal next step for a senior RevOps executive.", "ai_opener": "I noticed efficiently is scaling a B2B SaaS GTM engine with direct CEO visibility—exactly the kind of high-leverage revenue infrastructure challenge I've built my career around. While my background is deeper in RevOps and sales operations than demand gen, I've consistently owned the CAC/LTV analytics, Salesforce strategy, and funnel optimization that make growth marketing actually drive revenue. Worth a conversation to see if there's an opportunity to shape this differently.", "location_ok": true}, {"company": "Fieldguide, Inc.", "title": "Marketing Operations Lead – HubSpot & AI", "location": "Remote (United States)", "url": "https://www.jobleads.com/us/job/marketing-operations-lead-hubspot-ai-for-b2b-saas--united-states--ec8ff8bd3440c1af0f8bc408752e76316", "job_type": "Full-time", "description": "Fieldguide seeks a Marketing Operations Lead to enhance operational efficiency through HubSpot and AI tools. Key responsibilities include building and managing marketing campaigns, emails, and workflows in HubSpot, maintaining lead scoring and routing systems for effective sales handoffs, and ensuring data integrity and compliance within marketing operations. Requires 5+ years of B2B SaaS marketing operations experience, proven HubSpot proficiency at the Enterprise level, working knowledge of HTML, and advanced data analysis skills. The role offers an opportunity to innovate and improve marketing operations using AI-driven approaches.", "fit_score": 7, "score_reason": "Strong alignment on HubSpot expertise, B2B SaaS background, and AI-native GTM focus. However, this is a marketing ops specialist role rather than a strategic RevOps/GTM leadership position, representing a step down from Omri's senior executive level and core competencies.", "ai_opener": "Omri's experience building scalable revenue operations infrastructure across multiple B2B SaaS companies aligns well with Fieldguide's push to modernize marketing operations through HubSpot and AI. With 15+ years optimizing GTM workflows and pipeline efficiency, he could bring strategic rigor to your marketing ops—ensuring your lead scoring and routing systems drive predictable revenue outcomes, not just campaign metrics.", "location_ok": true}, {"company": "saas.group (Crosstalent brand)", "title": "Head of Sales & Marketing (B2B SaaS)", "location": "Remote (Global / work-from-anywhere)", "url": "https://euremotejobs.com/job/head-of-sales-and-marketing-b2b-saas/", "job_type": "Full-time", "description": "saas.group is hiring a Head of Sales & Marketing to lead all commercial activities for Crosstalent, a French Salesforce-based HRIS SaaS brand. The role takes full ownership of the growth engine from top-of-funnel acquisition through conversion, retention, and revenue expansion, building and scaling both Marketing and Sales functions alongside the CEO. Requires 7–10+ years of B2B SaaS commercial experience across Sales and Marketing, a proven track record scaling revenue in SMB/mid-market SaaS, deep understanding of SaaS metrics (ARR/MRR, CAC, LTV, NDR/GDR, churn), and comfort in a fully remote, high-autonomy environment. Salesforce knowledge a plus.", "fit_score": 8, "score_reason": "Strong alignment on B2B SaaS, Salesforce expertise, GTM leadership, and SaaS metrics mastery. The Head of Sales & Marketing scope is broader than pure RevOps, but the revenue operations, pipeline forecasting, and growth foundation are core strengths that translate directly to scaling a commercial engine.", "ai_opener": "Hi [Hiring Manager], I've spent 15+ years building and scaling revenue operations and GTM functions in B2B SaaS, with deep expertise in Salesforce, pipeline forecasting, and the metrics that drive growth (CAC/LTV, NDR, churn). I'm intrigued by Crosstalent's opportunity to own the full commercial growth engine—my background scaling SMB/mid-market SaaS revenue and building cross-functional alignment between Sales and Marketing suggests I could accelerate your trajectory from day one.", "location_ok": true}, {"company": "LumApps", "title": "Senior RevOps Manager", "location": "Remote (Texas / US)", "url": "https://www.remoterocketship.com/us/company/lumapps/jobs/senior-revops-manager-texas-remote/", "job_type": "Full-time", "description": "LumApps, an employee experience SaaS platform, seeks a Senior RevOps Manager to lead strategic initiatives aligned with the business plan, define and analyze commercial metrics across lifecycle stages, and partner with the VP RevOps, CFO, and business leaders to operationalize the annual revenue model. The role also drives AI initiatives across RevOps pillars and represents RevOps in CRO forums. Requires 6–10+ years in Revenue Operations, Strategy, or Business Operations in SaaS, experience partnering with executive leadership, expertise in KPI frameworks/forecasting/revenue modeling, strong data skills (Excel, SQL, BI), and hands-on experience with Salesforce, Clari, or Planhat.", "fit_score": 9, "score_reason": "Excellent match across all dimensions: 15+ years exceeds 6-10+ requirement, deep RevOps/GTM expertise aligns perfectly with strategic mandate, AI-native GTM experience directly applicable to AI initiatives mandate, and remote US role eliminates location constraints. Only minor gap: no explicit mention of Clari/Planhat, though Salesforce mastery is core.", "ai_opener": "Hi [Hiring Manager], I've spent 15+ years building scalable RevOps engines in B2B SaaS—from designing KPI frameworks and revenue forecasting models to operationalizing GTM strategies alongside exec leadership. LumApps' focus on AI-driven RevOps initiatives caught my attention, especially given my recent work embedding AI across pipeline forecasting and lifecycle analytics—I'd love to explore how I could help scale your commercial operations.", "location_ok": true}, {"company": "UTTR", "title": "Revenue Operations Manager", "location": "Remote (US time zones)", "url": "https://weworkremotely.com/remote-jobs/uttr-revenue-operations-manager", "job_type": "Full-time", "description": "UTTR, a B2B marketing agency specializing in paid advertising, creative, and revenue operations, seeks a Revenue Operations Manager to work directly with clients on strategic planning and execution. Responsibilities include understanding clients' revenue operations and business goals, creating project roadmaps, providing strategic recommendations to improve the revenue lifecycle, and building strong ongoing partnerships with client stakeholders to drive measurable outcomes. Requires B2B SaaS experience, the ability to adapt to new technologies and RevOps tools, and ideally startup experience. Fully remote team working EST/CST/MST/PST hours with flexible vacation.", "fit_score": 6, "score_reason": "Strong RevOps expertise and B2B SaaS background align well with the role, but the agency model (serving multiple clients) is atypical for Omri's direct revenue leadership experience. The US-timezone remote requirement is acceptable, though the advisory/consulting nature differs from hands-on operational execution he likely prefers.", "ai_opener": "Hi UTTR team – I've spent 15+ years building revenue operations and GTM infrastructure across B2B SaaS companies, scaling pipeline forecasting, CRM optimization, and cross-functional alignment. Your approach of bringing RevOps strategy directly to clients resonates with me, and I'm intrigued by how you're positioning revenue operations as a core consulting offering rather than just a support function.", "location_ok": true}, {"company": "Global-e", "title": "Senior Demand Generation Manager (B2B) — Marketing Ops adjacent", "location": "Petach Tikva, Israel (Hybrid)", "url": "https://jobs.secrettelaviv.com/", "job_type": "Full-time", "description": "Global-e, a leading B2B SaaS cross-border e-commerce enablement company, is hiring a Senior Demand Generation Manager to drive pipeline and revenue through B2B marketing programs. The role spans demand generation, campaign management, and marketing operations functions closely tied to revenue goals within a high-growth global SaaS environment. Based in the Tel Aviv area (Petach Tikva) with hybrid flexibility. Candidates should verify exact responsibilities and requirements directly via the company's official careers page, as this aggregated listing reflects a recently posted opening on Secret Tel Aviv's job board.", "fit_score": 6, "score_reason": "Strong location match and marketing ops adjacency align with Omri's RevOps background, but the role is positioned as Demand Generation rather than core RevOps/GTM leadership, representing a lateral or slight step down from target seniority. B2B SaaS and pipeline focus are positive, though e-commerce (even B2B e-commerce) isn't explicitly in his strong-fit vertical.", "ai_opener": "Hi – I noticed Global-e is building out demand generation and marketing ops functions in Petach Tikva. With 15+ years driving pipeline and GTM operations in B2B SaaS, I've built RevOps programs that directly tie marketing velocity to revenue forecasting. I'd be interested in understanding whether this role could expand into a broader revenue operations scope as the team scales.", "location_ok": true}];
let currentFilter="all";
function badgeClass(s){return s>=8?"score-green":s>=5?"score-yellow":"score-red";}
function filterVal(s){return s>=8?"high":s>=5?"mid":"low";}
function render(){
  const sorted=[...JOBS].sort((a,b)=>b.fit_score-a.fit_score);
  let v=0;
  document.getElementById("container").innerHTML=sorted.map(j=>{
    const fv=filterVal(j.fit_score);
    const show=currentFilter==="all"||fv===currentFilter;
    if(show)v++;
    return `<div class="job-card" data-filter="${fv}" style="display:${show?"":"none"}">
      <div class="card-row1">
        <div class="score-badge ${badgeClass(j.fit_score)}">${j.fit_score}</div>
        <div class="card-title-block">
          <div class="card-company">${j.company}</div>
          <div class="card-role">${j.title}</div>
        </div>
      </div>
      <div class="card-tags">
        ${j.location?`<span class="tag">📍 ${j.location}</span>`:""}
        ${j.job_type?`<span class="tag">${j.job_type}</span>`:""}
      </div>
      ${j.score_reason?`<div class="card-reason">${j.score_reason}</div>`:""}
      <div class="card-actions">
        <a href="${j.url}" target="_blank" rel="noopener" class="btn-view">View Job ↗</a>
        <button class="btn-copy" onclick="copyOpener(this,${JSON.stringify(j.ai_opener||'')})">Copy Opener 📋</button>
      </div>
    </div>`;
  }).join("");
  document.getElementById("count").textContent=v+" job"+(v!==1?"s":"");
}
function setFilter(e,f){
  currentFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  let v=0;
  document.querySelectorAll(".job-card").forEach(c=>{
    const show=f==="all"||c.dataset.filter===f;
    c.style.display=show?"":"none";
    if(show)v++;
  });
  document.getElementById("count").textContent=v+" job"+(v!==1?"s":"");
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
function copyOpener(btn,text){
  if(!text){showToast("No opener");return;}
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="Copied! ✓";btn.classList.add("copied");showToast("Opener copied!");
    setTimeout(()=>{btn.textContent="Copy Opener 📋";btn.classList.remove("copied");},2000);
  }).catch(()=>showToast("Copy failed"));
}
render();
</script>
</body>
</html>
