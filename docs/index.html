<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Tracker — Omri</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f4f6fb;--card:#ffffff;--text:#1a1d2b;--muted:#6b7280;--line:#e6e9f0;
      --accent:#2563eb;--green:#16a34a;--green-bg:#e7f7ee;--amber:#d97706;--amber-bg:#fef4e2;
      --red:#dc2626;--red-bg:#fdeaea;--wa:#25d366;--radius:16px;
      --shadow:0 1px 2px rgba(16,24,40,.04),0 4px 16px rgba(16,24,40,.06);
    }
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;padding-bottom:48px;-webkit-font-smoothing:antialiased}
    header{background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line);padding:16px 18px 12px;position:sticky;top:0;z-index:100}
    .header-top{display:flex;align-items:center;justify-content:space-between;gap:8px;max-width:760px;margin:0 auto}
    header h1{font-size:1.3rem;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
    .header-meta{font-size:.74rem;color:var(--muted);margin-top:3px}
    .sheet-link{background:#fff;border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:8px 12px;font-size:.78rem;text-decoration:none;font-weight:600;white-space:nowrap}
    .wrap{max-width:760px;margin:0 auto}
    .filter-bar{display:flex;gap:8px;padding:14px 18px 0;flex-wrap:wrap}
    .filter-btn{background:#fff;border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:7px 16px;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s}
    .filter-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
    .count-label{font-size:.78rem;color:var(--muted);padding:12px 18px 0;font-weight:600}
    .jobs-container{padding:12px 18px 0;display:flex;flex-direction:column;gap:14px}
    .job-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:12px}
    .card-row1{display:flex;align-items:flex-start;gap:14px}
    .score-badge{flex-shrink:0;width:52px;height:52px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;line-height:1}
    .score-badge .num{font-size:1.45rem}
    .score-badge .lbl{font-size:.52rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:2px;opacity:.75}
    .score-green{background:var(--green-bg);color:var(--green)}
    .score-amber{background:var(--amber-bg);color:var(--amber)}
    .score-red{background:var(--red-bg);color:var(--red)}
    .card-title-block{flex:1;min-width:0}
    .card-company{font-weight:800;font-size:1.05rem;letter-spacing:-.01em}
    .card-role{font-size:.88rem;color:var(--muted);margin-top:1px}
    .card-tags{display:flex;flex-wrap:wrap;gap:6px}
    .tag{background:#f4f6fb;border:1px solid var(--line);border-radius:8px;padding:3px 9px;font-size:.74rem;color:#4b5563;font-weight:500}
    .tag.date{color:var(--accent);background:#eef3ff;border-color:#dbe6ff}
    .card-reason{font-size:.84rem;color:#4b5563;line-height:1.5}
    .contact-box{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:11px 13px;display:flex;flex-direction:column;gap:6px}
    .contact-head{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
    .contact-main{display:flex;align-items:center;gap:10px}
    .avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
    .contact-info{flex:1;min-width:0}
    .contact-name{font-weight:700;font-size:.86rem}
    .contact-title{font-size:.74rem;color:var(--muted)}
    .contact-links{display:flex;gap:8px;flex-wrap:wrap}
    .clink{font-size:.74rem;font-weight:600;text-decoration:none;padding:5px 10px;border-radius:8px;border:1px solid var(--line);background:#fff;color:#374151;display:inline-flex;align-items:center;gap:4px}
    .clink.li{color:#0a66c2}
    .clink.em{color:var(--accent)}
    .card-actions{display:flex;gap:8px;margin-top:2px;flex-wrap:wrap}
    .btn{flex:1;min-width:90px;padding:11px 8px;border-radius:11px;font-size:.83rem;font-weight:700;text-align:center;cursor:pointer;border:1px solid var(--line);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;text-decoration:none}
    .btn-view{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn-copy{background:#fff;color:#374151}
    .btn-copy.copied{color:var(--green);border-color:var(--green)}
    .btn-wa{background:var(--wa);color:#fff;border-color:var(--wa)}
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--text);color:#fff;border-radius:24px;padding:11px 22px;font-size:.86rem;font-weight:600;z-index:999;transition:transform .3s ease;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.2)}
    #toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <div>
      <h1>🎯 Job Tracker</h1>
      <div class="header-meta">Omri Gonen · RevOps / GTM · Updated Jun 03, 2026</div>
    </div>
    <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1i33qr_r_xj_2LkHzg0Hxe5Dh4G_m4T21Xa4WNhQLkjg/edit" target="_blank">📊 Sheet</a>
  </div>
</header>
<div class="wrap">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter(event,'all')">All</button>
    <button class="filter-btn" onclick="setFilter(event,'high')">🟢 8+</button>
    <button class="filter-btn" onclick="setFilter(event,'mid')">🟡 5–7</button>
  </div>
  <div class="count-label" id="count"></div>
  <div class="jobs-container" id="container"></div>
</div>
<div id="toast"></div>
<script>
const JOBS=[
{"company":"Rapyd","title":"Revenue Operations Manager","location":"Tel Aviv, Israel (In-Office)","url":"https://www.rapyd.net/company/careers/positions/revenue-operations-manager-tel-aviv-israel/","job_type":"Full-time","posted":"2026-05-28","fit_score":9,"score_reason":"Exceptional match: 15+ years B2B SaaS RevOps, Salesforce/HubSpot expertise, and fintech background align perfectly. Role needs exactly his core competencies (pipeline forecasting, CAC/LTV, GTM ops), and Tel Aviv is in his preferred zone.","ai_opener":"Lihi, I've spent 15+ years building revenue operations engines for B2B SaaS and fintech, and I've followed Rapyd's scaling in global payments. The Revenue Operations Manager role caught my eye — driving operational efficiency and visibility across Sales, Marketing, and Finance at a high-velocity fintech is exactly what I thrive on. I'd love to explore how my Salesforce/HubSpot expertise and pipeline-forecasting track record could accelerate Rapyd's growth.","contact":{"name":"Lihi Rothschild-Sholder","title":"VP RevOps (hiring manager)","email":"lihir@rapyd.net","linkedin":"https://www.linkedin.com/in/lihi-rothschild-sholder-b5ab422a/"}},
{"company":"You.com","title":"Head of Revenue Operations","location":"Remote (Canada / California, USA)","url":"https://jobgether.com/remote-jobs/revenue-operations","job_type":"Full-time","posted":"2026-05-30","fit_score":9,"score_reason":"Senior RevOps role at an AI-native company aligns perfectly with 15+ years B2B SaaS, HubSpot proficiency, and GTM/forecasting specialization. Remote and ~$270K comp are ideal fits.","ai_opener":"Patrick, I noticed You.com is scaling RevOps for an AI platform, and the focus on revenue forecasting and pipeline predictability caught my attention. With 15+ years building RevOps functions in high-growth B2B SaaS (including AI-native GTM), I've scaled similar operational backbones from early revenue through predictable growth — I'd love to compare notes on how You.com is architecting that foundation.","contact":{"name":"Patrick Roberts","title":"RevOps Systems Manager (warm intro)","email":"patrick.roberts@you.com","linkedin":"https://www.linkedin.com/in/patrick-roberts-%E2%98%81-19323284/"}},
{"company":"Remote","title":"GTM Engineer, Revenue Operations","location":"Remote (Global)","url":"https://remote.com/openings/6509452003","job_type":"Full-time","posted":"2026-05-31","fit_score":9,"score_reason":"Excellent alignment with core RevOps expertise, GTM tech-stack design, pipeline forecasting, and AI-native GTM experience. Remote-global role matches location flexibility perfectly.","ai_opener":"Hi there — I noticed you're building out a GTM tech stack focused on AI-driven pipeline generation and automated workflows, exactly where I've spent the last 15 years in B2B SaaS. I've designed similar systems across scaling companies, from HubSpot/Salesforce architecture to data-pipeline automation that drove measurable CAC/LTV improvements. I'd love to explore how I could help Remote streamline your revenue operations infrastructure.","contact":null},
{"company":"GiveCampus","title":"Marketing Operations Lead","location":"Remote (USA)","url":"https://remotive.com/remote/jobs/marketing/marketing-operations-lead-4198648","job_type":"Full-time","posted":"2026-05-27","fit_score":9,"score_reason":"Exceptional match: first dedicated MarOps role aligns with senior RevOps/GTM background, HubSpot/Salesforce expertise, and experience building scalable revenue infrastructure. AI-powered GTM tools, attribution, and funnel analytics leverage his core strengths.","ai_opener":"Kelsey, I saw GiveCampus is building out its first dedicated Marketing Operations function — exactly the type of transformational infrastructure project I've spent 15+ years executing in B2B SaaS. I've led full HubSpot audits, architected Salesforce integrations, and built attribution frameworks that tie top-of-funnel performance to revenue outcomes. I'd love to explore how I could help scale your marketing operations engine.","contact":{"name":"Kelsey Ranta","title":"Head of Revenue Operations (hiring manager)","email":"kelseyr@undfoundation.org","linkedin":"https://www.linkedin.com/in/kelsey-ranta-44a9311b/"}},
{"company":"Vanta","title":"Revenue Operations Manager","location":"Remote","url":"https://www.indeed.com/q-revenue-operations-l-remote-jobs.html","job_type":"Full-time","posted":"2026-05-29","fit_score":8,"score_reason":"Excellent match on experience (15+ years far exceeds 4–6 needed), core RevOps competencies (forecasting, pipeline analysis, data integrity, systems), and B2B SaaS expertise. Remote is ideal; security/compliance SaaS is adjacent to core fintech/AI-native GTM strengths.","ai_opener":"Josh, I noticed Vanta is scaling GTM operations with a focus on pipeline health and revenue forecasting — areas where I've spent 15+ years architecting predictable revenue engines for high-growth B2B SaaS. With deep Salesforce/HubSpot systems experience, lead-to-revenue data integrity, and CAC/LTV optimization, I'd be interested in exploring how I could help Vanta accelerate its compliance-SaaS growth.","contact":{"name":"Josh MacIntyre","title":"Head of Revenue Operations (hiring manager)","email":"josh.macintyre@vanta.com","linkedin":"https://www.linkedin.com/in/josh-macintyre-15176749/"}},
{"company":"Checkmarx","title":"RevOps Business Partner (Maternity Cover)","location":"Tel Aviv / Ramat Gan, Israel","url":"https://jobs.secrettelaviv.com/list/category/sales/","job_type":"Full-time","posted":"2026-05-25","fit_score":8,"score_reason":"Strong alignment with core RevOps expertise in B2B SaaS, CRM management, and GTM operations. Checkmarx's AppSec focus and scale make this ideal; the maternity-cover (temporary) nature is the only consideration.","ai_opener":"I noticed Checkmarx is scaling its RevOps function with a cover role in Tel Aviv — given 15+ years driving revenue operations and GTM alignment in high-growth B2B SaaS, I'd immediately add value across sales, marketing, and CS orchestration. My Salesforce workflow and pipeline-forecasting track record fits what a mature AppSec company needs to accelerate its commercial machine.","contact":null},
{"company":"Qualcomm","title":"Manager, Sales Operations","location":"Ramat Gan, Israel","url":"https://il.linkedin.com/jobs/sales-engineer-jobs","job_type":"Full-time","posted":"2026-05-24","fit_score":8,"score_reason":"Strong alignment with RevOps/GTM background, sales-ops focus, KPI/pipeline expertise, and enterprise SaaS experience. Ramat Gan is within acceptable range. Minor gap: more tactical sales ops vs. strategic growth.","ai_opener":"My 15+ years building B2B SaaS GTM and RevOps systems map well to Qualcomm's Manager of Sales Operations role in Ramat Gan — owning data-driven sales projections, compensation strategy, and enablement in an enterprise environment is exactly the operational scaling work I've mastered. With strong Salesforce and KPI expertise, I'd love to explore driving revenue operations at scale with your team.","contact":null},
{"company":"Zoom","title":"Head of Marketing Operations","location":"Remote","url":"https://www.indeed.com/q-saas-marketing-l-remote-jobs.html","job_type":"Full-time","posted":"2026-05-22","fit_score":7,"score_reason":"Strong alignment on B2B SaaS scale, GTM systems, and remote, but this is a marketing-ops leadership role rather than revenue ops — a meaningful domain shift. Global scale and MarTech/data focus are compelling.","ai_opener":"I've spent 15+ years building revenue operations engines at scale across B2B SaaS, from pipeline forecasting to CAC/LTV optimization. Zoom's Head of Marketing Operations role caught my eye because the systems thinking required — MarTech orchestration, data infrastructure, lifecycle management — mirrors the revenue-ops frameworks I've built. Curious whether you're looking to deepen the link between marketing ops and revenue outcomes.","contact":null},
{"company":"Hyperdrive Recruiting (client)","title":"Senior GTM Engineer","location":"Remote","url":"https://www.indeed.com/q-gtm-engineer-saas-jobs.html","job_type":"Full-time","posted":"2026-05-26","fit_score":7,"score_reason":"Strong alignment with GTM engineering, AI-native systems, and revenue operations expertise. Primary concern: role emphasizes Python/SQL technical depth over RevOps leadership, which may underutilize his executive background.","ai_opener":"Omri Gonen here — 15+ years building predictable revenue engines in B2B SaaS. I've architected GTM automation and data infrastructure that tied CAC/LTV directly to pipeline forecasting, and I'm deeply familiar with AI-native approaches to ICP targeting and experimentation. Your focus on intelligent GTM systems resonates — curious if you want someone who bridges the technical automation layer with revenue strategy.","contact":null},
{"company":"Glopal","title":"Head of Growth Marketing (B2B SaaS)","location":"Remote (United States)","url":"https://startup.jobs/head-of-growth-marketing-b2b-saas-remote-glopal-7595192","job_type":"Full-time","posted":"2026-05-20","fit_score":6,"score_reason":"Strong alignment on B2B SaaS, seniority, data-driven mindset, remote eligibility. However, pure Growth Marketing/demand-gen rather than RevOps/GTM operations — outside core wheelhouse of pipeline forecasting and revenue infrastructure.","ai_opener":"I came across Glopal's Growth Marketing opening — while my expertise is rooted in RevOps and GTM infrastructure, my data-driven, pipeline-obsessed mentality and multi-channel campaign experience could be valuable here, especially if you're open to someone who can own demand generation and the revenue-operations backbone behind it. Worth a conversation?","contact":null},
{"company":"efficiently","title":"Head of Growth Marketing","location":"Remote","url":"https://www.indeed.com/viewjob?jk=28af3a5c76af5faa","job_type":"Full-time","posted":"2026-05-19","fit_score":6,"score_reason":"Strong alignment on B2B SaaS, Salesforce, pipeline creation, and founder-led GTM. Misalignment: heavily weighted to marketing/demand gen and Klaviyo, not RevOps infrastructure, forecasting, or sales ops.","ai_opener":"I was impressed by the product-market fit you've built in construction SaaS. I've spent 15+ years scaling B2B SaaS GTM and Salesforce-driven revenue operations — and while your role is marketing-forward, I'm curious whether you need someone to architect the revenue operations backbone behind demand gen: pipeline integrity, CAC/LTV unit economics, and forecasting to keep CEO-led growth calibrated.","contact":null}
];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const NOW=new Date();
let currentFilter="all";
function badgeClass(s){return s>=8?"score-green":s>=5?"score-amber":"score-red";}
function filterVal(s){return s>=8?"high":s>=5?"mid":"low";}
function postedLabel(d){
  if(!d) return "";
  const dt=new Date(d);
  if(isNaN(dt)) return "";
  const days=Math.round((NOW-dt)/86400000);
  let rel = days<=0?"today":days===1?"1 day ago":days+" days ago";
  return MONTHS[dt.getMonth()]+" "+dt.getDate()+" · "+rel;
}
function initials(name){return name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();}
function render(){
  const sorted=[...JOBS].sort((a,b)=>b.fit_score-a.fit_score);
  let v=0;
  document.getElementById("container").innerHTML=sorted.map((j,i)=>{
    const fv=filterVal(j.fit_score);
    const show=currentFilter==="all"||fv===currentFilter;
    if(show)v++;
    const c=j.contact;
    const contactHTML=c?`
      <div class="contact-box">
        <div class="contact-head">👤 Who to contact · via Clay</div>
        <div class="contact-main">
          <div class="avatar">${initials(c.name)}</div>
          <div class="contact-info">
            <div class="contact-name">${c.name}</div>
            <div class="contact-title">${c.title}</div>
          </div>
        </div>
        <div class="contact-links">
          ${c.email?`<a class="clink em" href="mailto:${c.email}">✉️ ${c.email}</a>`:""}
          ${c.linkedin?`<a class="clink li" href="${c.linkedin}" target="_blank" rel="noopener">in LinkedIn</a>`:""}
        </div>
      </div>`:"";
    return `<div class="job-card" data-filter="${fv}" style="display:${show?"":"none"}">
      <div class="card-row1">
        <div class="score-badge ${badgeClass(j.fit_score)}"><span class="num">${j.fit_score}</span><span class="lbl">fit</span></div>
        <div class="card-title-block">
          <div class="card-company">${j.company}</div>
          <div class="card-role">${j.title}</div>
        </div>
      </div>
      <div class="card-tags">
        ${j.posted?`<span class="tag date">🗓️ ${postedLabel(j.posted)}</span>`:""}
        ${j.location?`<span class="tag">📍 ${j.location}</span>`:""}
        ${j.job_type?`<span class="tag">${j.job_type}</span>`:""}
      </div>
      ${j.score_reason?`<div class="card-reason">${j.score_reason}</div>`:""}
      ${contactHTML}
      <div class="card-actions">
        <a href="${j.url}" target="_blank" rel="noopener" class="btn btn-view">View Job ↗</a>
        <button class="btn btn-copy" onclick='copyOpener(this,${i})'>Copy Opener 📋</button>
        <button class="btn btn-wa" onclick='shareWA(${i})'>WhatsApp</button>
      </div>
    </div>`;
  }).join("");
  document.getElementById("count").textContent=v+" job"+(v!==1?"s":"");
  window._sorted=sorted;
}
function setFilter(e,f){
  currentFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  render();
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
function copyOpener(btn,i){
  const j=window._sorted[i];const text=j.ai_opener||"";
  if(!text){showToast("No opener");return;}
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="Copied! ✓";btn.classList.add("copied");showToast("Opener copied!");
    setTimeout(()=>{btn.textContent="Copy Opener 📋";btn.classList.remove("copied");},2000);
  }).catch(()=>showToast("Copy failed"));
}
function shareWA(i){
  const j=window._sorted[i];const c=j.contact;
  let msg=`🎯 *${j.company}* — ${j.title}\n`;
  msg+=`Fit ${j.fit_score}/10 · 📍 ${j.location}\n`;
  if(j.posted) msg+=`Posted: ${postedLabel(j.posted)}\n`;
  if(c) msg+=`Contact: ${c.name}, ${c.title}${c.email?" ("+c.email+")":""}\n`;
  msg+=`\n${j.url}`;
  window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");
}
render();
</script>
</body>
</html>
