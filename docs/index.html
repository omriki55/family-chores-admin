<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎯 Job Tracker — Omri</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f1117;--card:#1e2130;--accent:#00c853;--text:#e0e0e0;--muted:#8a8fa8;--yellow:#ffd600;--red:#f44336;--border:#2a2d3e;--radius:12px}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding-bottom:40px}
    header{background:#131620;border-bottom:1px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:100}
    .header-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
    header h1{font-size:1.25rem;font-weight:700;color:var(--accent)}
    .header-meta{font-size:0.72rem;color:var(--muted);margin-top:2px}
    .filter-bar{display:flex;gap:8px;padding:12px 16px 0;flex-wrap:wrap}
    .filter-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 14px;font-size:.8rem;cursor:pointer;transition:all .15s}
    .filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
    .count-label{font-size:.75rem;color:var(--muted);padding:8px 16px 0}
    .jobs-container{padding:12px 16px 0;display:flex;flex-direction:column;gap:10px}
    .job-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:8px}
    .card-row1{display:flex;align-items:flex-start;gap:12px}
    .score-badge{flex-shrink:0;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:800}
    .score-green{background:rgba(0,200,83,.18);color:var(--accent);border:1.5px solid rgba(0,200,83,.35)}
    .score-yellow{background:rgba(255,214,0,.15);color:var(--yellow);border:1.5px solid rgba(255,214,0,.3)}
    .score-red{background:rgba(244,67,54,.15);color:var(--red);border:1.5px solid rgba(244,67,54,.3)}
    .card-title-block{flex:1;min-width:0}
    .card-company{font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-role{font-size:.82rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-tags{display:flex;flex-wrap:wrap;gap:6px}
    .tag{background:#1a1d2e;border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:.73rem;color:var(--muted)}
    .card-reason{font-size:.8rem;color:var(--muted);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-actions{display:flex;gap:8px;margin-top:2px}
    .btn-view,.btn-copy{flex:1;padding:9px 0;border-radius:8px;font-size:.82rem;font-weight:600;text-align:center;cursor:pointer;border:none;transition:opacity .15s}
    .btn-view{background:rgba(0,200,83,.12);color:var(--accent);border:1px solid rgba(0,200,83,.3);text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px}
    .btn-copy{background:rgba(138,143,168,.12);color:var(--muted);border:1px solid var(--border)}
    .btn-copy.copied{color:var(--accent);border-color:rgba(0,200,83,.4)}
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#2a2d3e;color:var(--text);border:1px solid var(--border);border-radius:24px;padding:10px 20px;font-size:.85rem;z-index:999;transition:transform .3s ease;pointer-events:none}
    #toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <div>
      <h1>🎯 Job Tracker</h1>
      <div class="header-meta">Last updated: Jun 03, 2026</div>
    </div>
    <a href="https://docs.google.com/spreadsheets/d/1i33qr_r_xj_2LkHzg0Hxe5Dh4G_m4T21Xa4WNhQLkjg/edit" target="_blank" style="background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 12px;font-size:.8rem;text-decoration:none">📊 Sheet</a>
  </div>
</header>
<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter(event,'all')">All</button>
  <button class="filter-btn" onclick="setFilter(event,'high')">🟢 8+</button>
  <button class="filter-btn" onclick="setFilter(event,'mid')">🟡 5–7</button>
</div>
<div class="count-label" id="count"></div>
<div class="jobs-container" id="container"></div>
<div id="toast"></div>
<script>
const JOBS=[{"company": "Rapyd", "title": "Revenue Operations Manager", "location": "Tel Aviv, Israel (In-Office)", "url": "https://www.rapyd.net/company/careers/positions/revenue-operations-manager-tel-aviv-israel/", "job_type": "Full-time", "description": "Rapyd, a global fintech/payments platform, seeks a Revenue Operations Manager to power its go-to-market strategy by driving operational efficiency, performance visibility, and actionable insights. The role partners with Sales, Marketing, Finance, and the broader GTM organization. Requires at least 5 years in Revenue/Sales/Customer Operations, strong BI skills with large datasets (Looker preferred), CRM proficiency (Salesforce or HubSpot), KPI tracking, revenue funnel analysis, and process improvement experience within GTM functions.", "fit_score": 9, "score_reason": "Exceptional match: 15+ years B2B SaaS RevOps expertise directly aligns with fintech focus, Salesforce/HubSpot proficiency, pipeline forecasting and KPI tracking capabilities. Only minor gap is Looker specificity (likely transferable BI skill).", "ai_opener": "Omri, I noticed your deep RevOps background in B2B SaaS—Rapyd is building something ambitious in fintech/payments and they're looking for a Revenue Operations Manager to architect their GTM infrastructure. Given your expertise in pipeline forecasting, CAC/LTV optimization, and Salesforce/HubSpot operations, this feels like a natural fit to scale their go-to-market engine.", "location_ok": true}, {"company": "Vanta", "title": "Revenue Operations Manager", "location": "Remote", "url": "https://www.indeed.com/q-revenue-operations-l-remote-jobs.html", "job_type": "Full-time", "description": "Vanta is hiring a Revenue Operations Manager to support GTM operations. The role requires 4-6 years of experience in revenue operations, sales operations, or business operations, ideally within a B2B SaaS environment. Responsibilities include managing revenue systems, supporting forecasting and pipeline analysis, ensuring data integrity across the lead-to-revenue lifecycle, and delivering insights on pipeline health, conversion, and revenue performance to support a high-growth security compliance SaaS company.", "fit_score": 8, "score_reason": "Omri's 15+ years of RevOps/GTM experience significantly exceeds the 4-6 year requirement, with strong alignment on core responsibilities (forecasting, pipeline analysis, data integrity, revenue insights). Perfect match on B2B SaaS background and remote location, though the role is mid-level compared to his seniority.", "ai_opener": "Omri here—I've spent 15+ years building RevOps infrastructure for B2B SaaS companies, and Vanta's focus on automating revenue systems and pipeline intelligence resonates with my work. Given your hypergrowth stage in security compliance, I'd be curious to explore how I could help scale your GTM operations beyond the traditional RevOps scope—whether that's optimizing your lead-to-revenue architecture or building predictive forecasting models that keep pace with your growth.", "location_ok": true}, {"company": "You.com", "title": "Head of Revenue Operations", "location": "Remote (Canada / California, USA)", "url": "https://jobgether.com/remote-jobs/revenue-operations", "job_type": "Full-time", "description": "You.com, an AI startup, is hiring a Head of Revenue Operations to design and scale the RevOps function. The senior-level role (5-10 years) emphasizes HubSpot CRM expertise, go-to-market strategy, and forecasting management. Compensation is around $270K. The leader will own revenue forecasting, pipeline analysis, and build the operational backbone supporting predictable revenue growth across sales, marketing, and customer success in a fast-paced AI environment.", "fit_score": 9, "score_reason": "Exceptional match—senior RevOps role at AI-native company with explicit HubSpot, forecasting, and GTM strategy focus aligns perfectly with Omri's 15+ years B2B SaaS expertise and core competencies. Remote location and compensation level match target profile exactly.", "ai_opener": "Omri here—your Head of RevOps opening at You.com caught my attention because building predictable revenue operations in AI-native GTM environments is exactly where I've spent the last 15 years. I've scaled RevOps functions from 0→1 in high-growth SaaS, owned complex forecasting and pipeline architecture in HubSpot, and led cross-functional revenue strategy during rapid scaling—the operational backbone piece you're looking to architect resonates deeply with my background.", "location_ok": true}, {"company": "Remote", "title": "GTM Engineer, Revenue Operations", "location": "Remote (Global)", "url": "https://remote.com/openings/6509452003", "job_type": "Full-time", "description": "Remote seeks a GTM Engineer within Revenue Operations to design and maintain a robust GTM tech stack that streamlines outbound prospecting and automates manual workflows. Responsibilities include building reporting and ROI analyses, ensuring data accuracy across GTM systems, developing automated data pipelines, and building scalable pipeline-generation systems using AI-driven insights. Requires extensive experience in a revenue operations or systems role, ideally in B2B SaaS. Base salary range is $40,900–$92,050 USD depending on location.", "fit_score": 9, "score_reason": "Exceptional alignment with Omri's core expertise in RevOps, GTM tech stack design, pipeline forecasting, and AI-driven systems. The role's focus on data automation, ROI analysis, and scalable pipeline generation directly matches his 15+ years of B2B SaaS experience and technical acumen.", "ai_opener": "Hi there – I noticed you're building out a GTM tech stack focused on AI-driven pipeline generation and workflow automation. With 15+ years scaling revenue operations in B2B SaaS, including deep experience architecting Salesforce/HubSpot ecosystems and implementing data-driven forecasting models, I'm excited about the opportunity to help streamline your outbound engine and eliminate the manual work that's likely still slowing your team down.", "location_ok": true}, {"company": "Glopal", "title": "Head of Growth Marketing (B2B SaaS)", "location": "Remote (United States)", "url": "https://startup.jobs/head-of-growth-marketing-b2b-saas-remote-glopal-7595192", "job_type": "Full-time", "description": "Glopal, an e-commerce/marketing SaaS company at growth stage, is hiring a Head of Growth Marketing to own demand generation, pipeline creation, and multi-channel campaigns that drive revenue. The senior-level role (5+ years) requires proven B2B SaaS growth or demand-gen leadership, expertise across paid media, SEO, content, and partnerships, plus a data-driven, experimentation-heavy mindset. The position is fully remote within the United States.", "fit_score": 6, "score_reason": "Strong alignment on B2B SaaS, seniority level, remote work, and data-driven mindset. However, this is a demand-gen/growth marketing role rather than RevOps/GTM operations—closer to marketing operations than Omri's core RevOps expertise. E-commerce SaaS angle is slightly tangential to his fintech/AI-native GTM focus.", "ai_opener": "Omri Gonen here—15+ years building revenue engines in B2B SaaS. I've scaled pipeline forecasting and demand generation systems that feed sales orgs, and I'm drawn to Glopal's growth-stage momentum. I'm curious how you're thinking about attribution and pipeline predictability across your multi-channel campaigns—that's where RevOps and growth marketing create real leverage.", "location_ok": true}, {"company": "Remote People (client)", "title": "Head of Growth - PLG B2B SaaS", "location": "Remote (UK / Europe / East Coast Canada)", "url": "https://jobs.remotepeople.com/jobs/6408195-head-of-growth-plg-b2b-saas", "job_type": "Full-time", "description": "A unicorn-status, product-led AI SaaS company seeks a full-stack Head of Growth to own the entire growth engine, including acquisition, activation, retention, and expansion. Responsibilities include scaling paid channels, SEO, content, and partnerships, designing self-serve onboarding and referral loops, and tracking CAC, LTV, and MRR via relentless A/B testing. Requires growth/marketing leadership at a SaaS company with PLG at scale and a proven demand-gen and PLG pipeline track record. Must be based in UK, Europe, or East Coast Canada for time zone alignment.", "fit_score": 7, "score_reason": "Strong alignment with RevOps/GTM expertise, PLG motion, and CAC/LTV metrics; however, role emphasizes full-stack growth/marketing leadership (paid channels, SEO, content) rather than pure RevOps/operations focus, which is slightly outside core wheelhouse.", "ai_opener": "I've scaled B2B SaaS GTM engines at unicorn-stage companies and built the RevOps infrastructure that powers PLG motions—from pipeline forecasting to CAC/LTV optimization. Your focus on relentless A/B testing and self-serve activation aligns perfectly with how I architect demand-gen systems. I'm curious how you're currently balancing paid channel scaling with product-led velocity.", "location_ok": true}, {"company": "efficiently", "title": "Head of Growth Marketing", "location": "Remote", "url": "https://www.indeed.com/viewjob?jk=28af3a5c76af5faa", "job_type": "Full-time", "description": "efficiently, a construction/design collaboration SaaS platform, is hiring a Head of Growth Marketing to build and scale its B2B growth engine. The role owns demand generation, pipeline creation, funnel optimization (lead to activation to champion), and the MarTech stack (Salesforce, Klaviyo, Instantly, GA4, attribution tools). Requires B2B SaaS experience, a proven track record scaling multi-channel campaigns tied to revenue, strong analytical/attribution skills, and comfort in a founder-led environment. Reports directly to the CEO.", "fit_score": 7, "score_reason": "Strong alignment on B2B SaaS, MarTech stack (Salesforce), and revenue-tied growth metrics. Gap: role is heavily marketing-focused (demand gen, attribution, multi-channel campaigns) rather than RevOps/GTM infrastructure—Omri's core strength is pipeline architecture and revenue systems, not campaign execution.", "ai_opener": "Hi [Founder], I came across efficiently's vision for construction collaboration and noticed you're building out your growth engine. With 15+ years scaling B2B SaaS GTM motions and deep Salesforce expertise, I've spent my career architecting the pipeline infrastructure and revenue systems that support exactly what you're describing—turning demand gen into predictable, attributable revenue. I'm curious whether you're also thinking about the RevOps/forecasting layer that typically multiplies growth marketing ROI.", "location_ok": true}, {"company": "GiveCampus", "title": "Marketing Operations Lead", "location": "Remote (USA)", "url": "https://remotive.com/remote/jobs/marketing/marketing-operations-lead-4198648", "job_type": "Full-time", "description": "GiveCampus is hiring its first dedicated Marketing Operations Lead to build and scale the marketing ops function within Revenue Operations. The role owns systems, processes, data integrity, reporting, and performance infrastructure powering the top-of-funnel engine, including the HubSpot platform and Salesforce integration. Responsibilities include a full HubSpot audit/rebuild, campaign execution frameworks, attribution tracking, and implementing AI-powered tools. Requires deep HubSpot expertise, strong understanding of SaaS revenue metrics and funnel analytics, and technical fluency with integrations, data modeling, and APIs.", "fit_score": 9, "score_reason": "Exceptional match - builds first marketing ops function at growth-stage SaaS, requires HubSpot/Salesforce expertise and RevOps mindset that directly aligns with Omri's 15+ years B2B SaaS background. Remote location and technical infrastructure focus (attribution, data modeling, integrations) perfectly suit his senior GTM engineering capabilities.", "ai_opener": "Omri here - I noticed GiveCampus is building its first dedicated Marketing Ops function. Having scaled revenue operations and marketing infrastructure across multiple B2B SaaS companies, I'm drawn to the challenge of architecting your HubSpot/Salesforce foundation from day one. The attribution tracking and AI-powered tools you're implementing align exactly with how I've historically connected top-of-funnel metrics to pipeline forecasting and CAC/LTV optimization.", "location_ok": true}, {"company": "Zoom", "title": "Head of Marketing Operations", "location": "Remote", "url": "https://www.indeed.com/q-saas-marketing-l-remote-jobs.html", "job_type": "Full-time", "description": "Zoom is hiring a Head of Marketing Operations to lead and scale global marketing operations teams across campaign operations, marketing technology, data, analytics, and lead lifecycle management. This senior leadership role drives the systems and processes that support demand generation and marketing performance at scale for a global B2B SaaS organization. Strong background in marketing operations leadership, MarTech, and data/analytics within a large SaaS environment is expected.", "fit_score": 7, "score_reason": "Strong alignment on senior leadership, B2B SaaS scale, MarTech, and data/analytics expertise. Some gap as this is marketing operations leadership rather than revenue operations, but the systems thinking, demand gen focus, and global team leadership translate well.", "ai_opener": "Omri, Zoom's scale and complexity across global marketing operations is exactly the kind of challenging GTM infrastructure problem you've solved throughout your RevOps career. Your track record building pipeline forecasting and lead lifecycle systems at scale would directly translate to driving their demand generation efficiency—I thought this Head of Marketing Operations role might be worth a conversation.", "location_ok": true}, {"company": "Checkmarx", "title": "RevOps Business Partner (Maternity Leave Cover)", "location": "Tel Aviv / Ramat Gan, Israel", "url": "https://jobs.secrettelaviv.com/list/category/sales/", "job_type": "Full-time", "description": "Checkmarx, an application security (AppSec) SaaS company, is hiring a RevOps Business Partner on a maternity-leave cover basis based in Tel Aviv/Ramat Gan. The role supports go-to-market and commercial teams with revenue operations processes, reporting, forecasting, and cross-functional alignment across sales, marketing, and customer success. Suited to candidates with revenue/sales operations experience in a B2B SaaS environment who can manage CRM data and operational workflows in a fast-paced cybersecurity company.", "fit_score": 8, "score_reason": "Strong alignment with Omri's core RevOps expertise, B2B SaaS background, and GTM operational focus. Primary concerns: maternity cover is temporary, and AppSec/cybersecurity is outside his stated fintech/AI-native GTM sweet spot, though B2B SaaS fundamentals transfer well.", "ai_opener": "I noticed Checkmarx is looking for RevOps support during your maternity leave coverage period. With 15+ years building revenue operations infrastructure in B2B SaaS environments, I've managed similar CRM-driven forecasting and commercial alignment challenges—though my recent focus has been in fintech and AI-native GTM plays. I'd be interested in exploring whether my pipeline architecture and cross-functional ops experience could accelerate your team's scaling during this critical transition.", "location_ok": true}, {"company": "Qualcomm", "title": "Manager, Sales Operations", "location": "Ramat Gan, Israel", "url": "https://il.linkedin.com/jobs/sales-engineer-jobs", "job_type": "Full-time", "description": "Qualcomm is hiring a Manager, Sales Operations based in Ramat Gan, Israel. The role owns tactical sales operations, providing data-driven projections anchored in established KPIs, supporting onboarding and training of sales talent, and partnering with Finance, HR, and Sales to develop incentive and compensation programs. Suited to candidates with sales operations management experience, strong analytical skills, and CRM proficiency in a technology/enterprise environment.", "fit_score": 8, "score_reason": "Strong alignment with Omri's core RevOps/GTM expertise in sales operations, KPI management, pipeline forecasting, and CRM proficiency in enterprise tech. Ramat Gan is within acceptable commute range from Tel Aviv area.", "ai_opener": "Omri's 15+ years scaling B2B SaaS revenue operations make him a natural fit for Qualcomm's Sales Operations Manager role. His proven track record building data-driven forecasting models, designing compensation programs, and optimizing CRM workflows across enterprise tech environments directly addresses your need for tactical sales operations leadership anchored in KPIs.", "location_ok": true}, {"company": "Hyperdrive Recruiting (client)", "title": "Senior GTM Engineer", "location": "Remote", "url": "https://www.indeed.com/q-gtm-engineer-saas-jobs.html", "job_type": "Full-time", "description": "A B2B SaaS client of Hyperdrive Recruiting is hiring a Senior GTM Engineer to build the next generation of intelligent go-to-market systems. The role focuses on architecting data-driven, automated GTM infrastructure that transforms ideal customer profiles into predictable revenue using automation, experimentation, and AI/LLM tooling. Requires experience with Python or SQL, API integrations, and automation frameworks, along with strong revenue operations intuition across sales and marketing systems.", "fit_score": 7, "score_reason": "Strong alignment with GTM automation, revenue systems architecture, and AI-native tooling focus. Primary gap is technical depth—role heavily emphasizes Python/SQL engineering, where Omri's strength is RevOps strategy and systems design rather than hands-on coding.", "ai_opener": "Omri—your 15+ years building predictable revenue systems in B2B SaaS caught our attention for Hyperdrive's Senior GTM Engineer role. We're backing a client architecting the next-gen intelligent GTM stack, and your deep RevOps intuition across sales/marketing systems + experience with automation frameworks and ICP-to-revenue workflows feels like the strategic foundation they need—even if Python isn't your primary language, your ability to translate business problems into data-driven infrastructure could unlock their automation roadmap.", "location_ok": true}];
let currentFilter="all";
function badgeClass(s){return s>=8?"score-green":s>=5?"score-yellow":"score-red";}
function filterVal(s){return s>=8?"high":s>=5?"mid":"low";}
function render(){
  const sorted=[...JOBS].sort((a,b)=>b.fit_score-a.fit_score);
  let v=0;
  document.getElementById("container").innerHTML=sorted.map(j=>{
    const fv=filterVal(j.fit_score);
    const show=currentFilter==="all"||fv===currentFilter;
    if(show)v++;
    return `<div class="job-card" data-filter="${fv}" style="display:${show?"":"none"}">
      <div class="card-row1">
        <div class="score-badge ${badgeClass(j.fit_score)}">${j.fit_score}</div>
        <div class="card-title-block">
          <div class="card-company">${j.company}</div>
          <div class="card-role">${j.title}</div>
        </div>
      </div>
      <div class="card-tags">
        ${j.location?`<span class="tag">📍 ${j.location}</span>`:""}
        ${j.job_type?`<span class="tag">${j.job_type}</span>`:""}
      </div>
      ${j.score_reason?`<div class="card-reason">${j.score_reason}</div>`:""}
      <div class="card-actions">
        <a href="${j.url}" target="_blank" rel="noopener" class="btn-view">View Job ↗</a>
        <button class="btn-copy" onclick="copyOpener(this,${JSON.stringify(j.ai_opener||'')})">Copy Opener 📋</button>
      </div>
    </div>`;
  }).join("");
  document.getElementById("count").textContent=v+" job"+(v!==1?"s":"");
}
function setFilter(e,f){
  currentFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  let v=0;
  document.querySelectorAll(".job-card").forEach(c=>{
    const show=f==="all"||c.dataset.filter===f;
    c.style.display=show?"":"none";
    if(show)v++;
  });
  document.getElementById("count").textContent=v+" job"+(v!==1?"s":"");
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
function copyOpener(btn,text){
  if(!text){showToast("No opener");return;}
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="Copied! ✓";btn.classList.add("copied");showToast("Opener copied!");
    setTimeout(()=>{btn.textContent="Copy Opener 📋";btn.classList.remove("copied");},2000);
  }).catch(()=>showToast("Copy failed"));
}
render();
</script>
</body>
</html>
