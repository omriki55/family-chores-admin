<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Tracker — Omri</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f4f6fb;--card:#ffffff;--text:#1a1d2b;--muted:#6b7280;--line:#e6e9f0;
      --accent:#2563eb;--green:#16a34a;--green-bg:#e7f7ee;--amber:#d97706;--amber-bg:#fef4e2;
      --red:#dc2626;--red-bg:#fdeaea;--wa:#25d366;--radius:16px;
      --shadow:0 1px 2px rgba(16,24,40,.04),0 4px 16px rgba(16,24,40,.06);
    }
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;padding-bottom:48px;-webkit-font-smoothing:antialiased}
    header{background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line);padding:16px 18px 12px;position:sticky;top:0;z-index:100}
    .header-top{display:flex;align-items:center;justify-content:space-between;gap:8px;max-width:760px;margin:0 auto}
    header h1{font-size:1.3rem;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
    .header-meta{font-size:.74rem;color:var(--muted);margin-top:3px}
    .sheet-link{background:#fff;border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:8px 12px;font-size:.78rem;text-decoration:none;font-weight:600;white-space:nowrap}
    .wrap{max-width:760px;margin:0 auto}
    .filter-bar{display:flex;gap:8px;padding:14px 18px 0;flex-wrap:wrap}
    .filter-btn{background:#fff;border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:7px 16px;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s}
    .filter-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
    .count-label{font-size:.78rem;color:var(--muted);padding:12px 18px 0;font-weight:600}
    .jobs-container{padding:12px 18px 0;display:flex;flex-direction:column;gap:14px}
    .job-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:12px}
    .card-row1{display:flex;align-items:flex-start;gap:14px}
    .score-badge{flex-shrink:0;width:52px;height:52px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;line-height:1}
    .score-badge .num{font-size:1.45rem}
    .score-badge .lbl{font-size:.52rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:2px;opacity:.75}
    .score-green{background:var(--green-bg);color:var(--green)}
    .score-amber{background:var(--amber-bg);color:var(--amber)}
    .score-red{background:var(--red-bg);color:var(--red)}
    .card-title-block{flex:1;min-width:0}
    .card-company{font-weight:800;font-size:1.05rem;letter-spacing:-.01em}
    .card-role{font-size:.88rem;color:var(--muted);margin-top:1px}
    .card-tags{display:flex;flex-wrap:wrap;gap:6px}
    .tag{background:#f4f6fb;border:1px solid var(--line);border-radius:8px;padding:3px 9px;font-size:.74rem;color:#4b5563;font-weight:500}
    .tag.date{color:var(--accent);background:#eef3ff;border-color:#dbe6ff}
    .card-reason{font-size:.84rem;color:#4b5563;line-height:1.5}
    .contact-box{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:11px 13px;display:flex;flex-direction:column;gap:6px}
    .contact-head{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
    .contact-main{display:flex;align-items:center;gap:10px}
    .avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
    .contact-info{flex:1;min-width:0}
    .contact-name{font-weight:700;font-size:.86rem}
    .contact-title{font-size:.74rem;color:var(--muted)}
    .contact-links{display:flex;gap:8px;flex-wrap:wrap}
    .clink{font-size:.74rem;font-weight:600;text-decoration:none;padding:5px 10px;border-radius:8px;border:1px solid var(--line);background:#fff;color:#374151;display:inline-flex;align-items:center;gap:4px}
    .clink.li{color:#0a66c2}
    .clink.em{color:var(--accent)}
    .card-actions{display:flex;gap:8px;margin-top:2px;flex-wrap:wrap}
    .btn{flex:1;min-width:90px;padding:11px 8px;border-radius:11px;font-size:.83rem;font-weight:700;text-align:center;cursor:pointer;border:1px solid var(--line);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;text-decoration:none}
    .btn-view{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn-copy{background:#fff;color:#374151}
    .btn-copy.copied{color:var(--green);border-color:var(--green)}
    .btn-wa{background:var(--wa);color:#fff;border-color:var(--wa)}
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--text);color:#fff;border-radius:24px;padding:11px 22px;font-size:.86rem;font-weight:600;z-index:999;transition:transform .3s ease;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.2)}
    #toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <div>
      <h1>🎯 Job Tracker</h1>
      <div class="header-meta">Omri Gonen · RevOps / GTM · Updated Jun 03, 2026</div>
    </div>
    <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1i33qr_r_xj_2LkHzg0Hxe5Dh4G_m4T21Xa4WNhQLkjg/edit" target="_blank">📊 Sheet</a>
  </div>
</header>
<div class="wrap">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter(event,'all')">All</button>
    <button class="filter-btn" onclick="setFilter(event,'high')">🟢 8+</button>
    <button class="filter-btn" onclick="setFilter(event,'mid')">🟡 5–7</button>
  </div>
  <div class="count-label" id="count"></div>
  <div class="jobs-container" id="container"></div>
</div>
<div id="toast"></div>
<script>
const JOBS=[{"company": "Finout", "title": "Head of Revenue Operations", "location": "Tel Aviv / New York (Hybrid)", "url": "https://www.builtinnyc.com/job/head-revenue-operations/8178347", "job_type": "Full-time", "description": "Reporting to the CRO, this hands-on leadership role builds and scales the operational backbone of Finout's GTM engine as the cloud-cost company enters its 2026 growth phase. Requires 7+ years in Revenue Operations, Sales Ops, or Strategy within high-growth B2B SaaS, experience scaling RevOps beyond $30M+ ARR, deep Salesforce administration and revenue analytics expertise, and strong cross-functional leadership across Sales, Marketing, Finance, and HR. A leader-doer who can own executive strategy while building flows, dashboards, and data models, and collaborate across time zones with the Tel Aviv HQ.", "fit_score": 9, "score_reason": "Omri perfectly matches the seniority, domain expertise (Finout operates in cloud FinOps—adjacent to his B2B SaaS and Fintech background), and hands-on RevOps leadership profile. The Tel Aviv/New York hybrid structure aligns with his location flexibility, and 15+ years in GTM operations far exceeds the 7+ requirement with demonstrated scaling experience.", "ai_opener": "Omri, I came across Finout's Head of Revenue Operations role and thought of you immediately—your 15+ years scaling GTM operations in high-growth B2B SaaS is exactly what a cloud-cost native company needs as it hits its 2026 inflection point. With your deep Salesforce expertise and track record building RevOps engines beyond $30M+ ARR, you'd have both the strategic chops to report to the CRO and the hands-on credibility to own the operational backbone across Sales, Marketing, and Finance. The Tel Aviv/New York split also seems like it was built for your profile.", "location_ok": true, "contact": null}, {"company": "Gong.io", "title": "RevOps Manager, Territory Strategy & Operations", "location": "Remote (US) / Global teams incl. Israel", "url": "https://job-boards.greenhouse.io/gongio/jobs/4668642006", "job_type": "Full-time", "description": "This RevOps Manager redesigns territory models and processes for global scalability, partnering with Sales leadership, Strategy, and Finance to optimize territory compositions and align with headcount plans. Responsibilities include whitespace analysis, coverage recommendations, and maintaining accurate territory mapping in CRM and territory management tools. Requires deep understanding of B2B SaaS GTM models, sales territories, and segmentation strategies, plus strong analytical skills in Excel, SQL, and BI tools (Tableau, Retool), and proficiency with Salesforce and tools like Fullcast, Pigment, or Anaplan. Salary range $149,000–$175,000 USD.", "fit_score": 9, "score_reason": "Exceptional match for a senior RevOps executive—territory strategy, B2B SaaS GTM optimization, Salesforce proficiency, and analytical rigor (SQL, BI tools) align perfectly with Omri's 15+ years of revenue operations expertise. Remote/Global structure with Israel team presence removes any location friction.", "ai_opener": "Hi [Hiring Manager], I noticed Gong is scaling territory strategy operations globally, and given my 15+ years redesigning go-to-market models and territory compositions for hypergrowth B2B SaaS companies—including deep Salesforce, SQL, and BI tool expertise—I'd be valuable in optimizing your coverage models and aligning headcount to whitespace. I'm particularly interested in how you're approaching territory segmentation across your Israel and global teams, and I'd love to explore how my GTM and RevOps background could accelerate Gong's next scaling phase.", "location_ok": true, "contact": null}, {"company": "Remote (remote.com)", "title": "GTM Engineer, Revenue Operations", "location": "Remote (Global)", "url": "https://remote.com/openings/6509452003", "job_type": "Full-time", "description": "This GTM Engineer designs and maintains a robust GTM tech stack to streamline outbound prospecting and minimize manual effort, implementing automated workflows to boost efficiency and scalability. Responsibilities include building automated data pipelines, creating Ideal Customer Profiles, developing reporting and ROI analyses, and ensuring data integrity across GTM systems. The role works cross-functionally with Sales, Revenue Operations, and Technology teams, leveraging AI-driven insights for pipeline generation. Requires extensive experience in a revenue operations or systems role, ideally in B2B SaaS. Reports to Director, Revenue Systems & Processes. Base salary $40,900–$92,050 USD.", "fit_score": 8, "score_reason": "Excellent alignment with RevOps expertise, B2B SaaS background, and AI-native GTM focus. Role is GTM Engineer with clear systems and automation emphasis—perfect for senior RevOps executive seeking hands-on technical impact. Only minor concern: salary range ($40.9K-$92K) appears below market for 15+ year veteran, though base could be negotiable.", "ai_opener": "I noticed remote.com is building out GTM engineering capabilities around data pipelines and AI-driven prospecting—exactly where I've spent the last 15 years in B2B SaaS. I've designed similar tech stacks at scale, from ICP frameworks to automated revenue workflows, and I'm specifically looking for a role where I can own the technical systems that drive GTM efficiency. Happy to explore how my background in RevOps architecture could accelerate your pipeline generation.", "location_ok": true, "contact": null}, {"company": "Meisterlabs (MeisterTask)", "title": "GTM Engineer", "location": "Remote / Europe", "url": "https://www.meistertask.com/pages/jobs/gtm-engineer", "job_type": "Full-time", "description": "As part of the Revenue Operations team, this GTM Engineer designs and implements automation and AI-powered solutions across Sales, Marketing, Customer Success, and Partnerships to help teams move faster and deliver better experiences. The role involves understanding team workflows, building systems that reduce manual work, improve handoffs, and support scalable growth. Requires 5+ years in technical roles supporting GTM teams in fast-paced B2B SaaS environments, experience building AI-powered solutions with platforms like OpenAI and Claude (enrichment, prospect research, internal copilots), and strong process optimization skills across the GTM funnel.", "fit_score": 9, "score_reason": "Perfect alignment with Omri's RevOps expertise, B2B SaaS background, and GTM automation focus. The AI-powered solutions requirement matches his modern GTM approach, though the role is slightly more technical/builder-focused than his typical IC pattern.", "ai_opener": "Omri here—I've spent 15+ years building revenue systems at scale in B2B SaaS, and MeisterTask's approach to AI-powered GTM automation caught my attention. Your vision of reducing manual handoffs across Sales, Marketing, and CS aligns exactly with how I've architected RevOps stacks—particularly around intelligent enrichment and workflow optimization. Would love to explore how I could help accelerate your team's automation roadmap.", "location_ok": true, "contact": null}, {"company": "efficiently", "title": "Head of Growth (Growth Marketing)", "location": "Remote", "url": "https://www.indeed.com/viewjob?jk=28af3a5c76af5faa", "job_type": "Full-time", "description": "efficiently, a construction/design collaboration SaaS platform, is hiring a Head of Growth to build and scale its B2B growth engine, owning demand generation, pipeline creation, and multi-channel campaigns. Responsibilities span growth strategy across paid, organic, and outbound channels, funnel optimization from lead to champion, and managing the MarTech stack (Salesforce, Klaviyo, Instantly, GA4) with dashboards tracking CAC, LTV, and pipeline contribution. Requires proven B2B SaaS experience scaling multi-channel campaigns tied to revenue, strong marketing automation/CRM grasp, and a builder mindset. Reports directly to the CEO.", "fit_score": 7, "score_reason": "Strong alignment on B2B SaaS GTM expertise, Salesforce proficiency, and revenue metrics (CAC/LTV/pipeline) that match Omri's core strengths. Primary gap: this is a growth marketing/demand gen role rather than RevOps operations focus, requiring more hands-on campaign execution than typical for a senior RevOps executive.", "ai_opener": "Hi efficiently team — I'm drawn to your Head of Growth role because scaling B2B SaaS GTM engines across multi-channel campaigns is exactly where I've driven revenue impact. With 15+ years optimizing Salesforce, pipeline forecasting, and CAC/LTV metrics for SaaS, I can build the revenue-connected growth machine you're architecting — particularly in translating paid, organic, and outbound into predictable pipeline.", "location_ok": true, "contact": null}, {"company": "Fieldguide, Inc.", "title": "Marketing Operations Lead – HubSpot & AI", "location": "Remote (United States)", "url": "https://www.jobleads.com/us/job/marketing-operations-lead-hubspot-ai-for-b2b-saas--united-states--ec8ff8bd3440c1af0f8bc408752e76316", "job_type": "Full-time", "description": "Fieldguide seeks a Marketing Operations Lead to enhance operational efficiency through HubSpot and AI tools. Key responsibilities include building and managing marketing campaigns, emails, and workflows in HubSpot, maintaining lead scoring and routing systems for effective sales handoffs, and ensuring data integrity and compliance within marketing operations. Requires 5+ years of B2B SaaS marketing operations experience, proven HubSpot proficiency at the Enterprise level, working knowledge of HTML, and advanced data analysis skills. The role offers an opportunity to innovate and improve marketing operations using AI-driven approaches.", "fit_score": 7, "score_reason": "Strong match on HubSpot expertise, B2B SaaS background, and AI-native GTM orientation, but role is narrower than Omri's senior RevOps/Head of Revenue Operations target level and lacks the pipeline forecasting/sales operations components he typically owns.", "ai_opener": "Fieldguide's focus on AI-driven marketing operations caught my attention—I've spent 15+ years building revenue systems that blend marketing and sales ops, and I've seen firsthand how HubSpot + AI can unlock efficiency at scale. Your need for someone who can architect lead scoring, ensure data integrity, and innovate with AI tools aligns with how I've approached GTM transformation in B2B SaaS. I'd be interested in exploring whether this role could expand into broader RevOps strategy.", "location_ok": true, "contact": null}, {"company": "saas.group (Crosstalent brand)", "title": "Head of Sales & Marketing (B2B SaaS)", "location": "Remote (Global / work-from-anywhere)", "url": "https://euremotejobs.com/job/head-of-sales-and-marketing-b2b-saas/", "job_type": "Full-time", "description": "saas.group is hiring a Head of Sales & Marketing to lead all commercial activities for Crosstalent, a French Salesforce-based HRIS SaaS brand. The role takes full ownership of the growth engine from top-of-funnel acquisition through conversion, retention, and revenue expansion, building and scaling both Marketing and Sales functions alongside the CEO. Requires 7–10+ years of B2B SaaS commercial experience across Sales and Marketing, a proven track record scaling revenue in SMB/mid-market SaaS, deep understanding of SaaS metrics (ARR/MRR, CAC, LTV, NDR/GDR, churn), and comfort in a fully remote, high-autonomy environment. Salesforce knowledge a plus.", "fit_score": 7, "score_reason": "Strong alignment on B2B SaaS, Salesforce, SaaS metrics expertise, and remote setup. However, role is Head of Sales & Marketing (combined function) rather than pure RevOps/GTM engineering focus—requires sales leadership which isn't Omri's primary target. Still a compelling growth opportunity for a senior RevOps executive capable of owning broader commercial strategy.", "ai_opener": "Hi team—I've been following saas.group's growth trajectory with Crosstalent, and the opportunity to build a scalable commercial engine for a Salesforce-native HRIS platform resonates deeply with my background. Over 15 years in B2B SaaS, I've architected revenue operations systems and GTM strategies that scale from SMB to mid-market—including CAC/LTV optimization, pipeline forecasting, and NDR expansion. I'd be interested in exploring how a RevOps-first approach to Sales & Marketing alignment could accelerate your growth.", "location_ok": true, "contact": null}, {"company": "LumApps", "title": "Senior RevOps Manager", "location": "Remote (Texas / US)", "url": "https://www.remoterocketship.com/us/company/lumapps/jobs/senior-revops-manager-texas-remote/", "job_type": "Full-time", "description": "LumApps, an employee experience SaaS platform, seeks a Senior RevOps Manager to lead strategic initiatives aligned with the business plan, define and analyze commercial metrics across lifecycle stages, and partner with the VP RevOps, CFO, and business leaders to operationalize the annual revenue model. The role also drives AI initiatives across RevOps pillars and represents RevOps in CRO forums. Requires 6–10+ years in Revenue Operations, Strategy, or Business Operations in SaaS, experience partnering with executive leadership, expertise in KPI frameworks/forecasting/revenue modeling, strong data skills (Excel, SQL, BI), and hands-on experience with Salesforce, Clari, or Planhat.", "fit_score": 9, "score_reason": "Exceptional match: Senior RevOps role at scale-up SaaS with Salesforce/forecasting/KPI framework requirements directly aligned with Omri's 15+ years expertise. AI-native GTM initiatives and strategic partnership with executive leadership (VP RevOps, CFO) leverage his demonstrated strengths.", "ai_opener": "Omri Gonen here — seen LumApps' push into AI-driven employee experience and your RevOps team's mandate to operationalize the revenue model. With 15+ years scaling B2B SaaS GTM engines and building predictive forecasting frameworks, I've built exactly what you're looking to expand: Salesforce-native revenue stacks that feed real-time KPI visibility to CFO and executive forums. Curious if you're looking for someone who can own both the operational rigor and the strategic AI initiatives across your RevOps pillars.", "location_ok": true, "contact": null}, {"company": "UTTR", "title": "Revenue Operations Manager", "location": "Remote (US time zones)", "url": "https://weworkremotely.com/remote-jobs/uttr-revenue-operations-manager", "job_type": "Full-time", "description": "UTTR, a B2B marketing agency specializing in paid advertising, creative, and revenue operations, seeks a Revenue Operations Manager to work directly with clients on strategic planning and execution. Responsibilities include understanding clients' revenue operations and business goals, creating project roadmaps, providing strategic recommendations to improve the revenue lifecycle, and building strong ongoing partnerships with client stakeholders to drive measurable outcomes. Requires B2B SaaS experience, the ability to adapt to new technologies and RevOps tools, and ideally startup experience. Fully remote team working EST/CST/MST/PST hours with flexible vacation.", "fit_score": 6, "score_reason": "Strong RevOps expertise and B2B SaaS background align well with the role's requirements, but the agency model (client-facing consulting vs. building internal ops) is a meaningful pivot from typical RevOps leadership tracks. Remote US hours are feasible but not ideal for Tel Aviv timezone.", "ai_opener": "Hi [Hiring Manager], I've built revenue operations from ground zero at multiple B2B SaaS startups, scaling pipeline forecasting and ops infrastructure across Salesforce and HubSpot—and I'm intrigued by UTTR's model of bringing that expertise directly to clients. With 15+ years in GTM operations, I'd bring both the strategic framework and hands-on execution chops to help your clients solve their toughest revenue challenges.", "location_ok": true, "contact": null}, {"company": "Global-e", "title": "Senior Demand Generation Manager (B2B) — Marketing Ops adjacent", "location": "Petach Tikva, Israel (Hybrid)", "url": "https://jobs.secrettelaviv.com/", "job_type": "Full-time", "description": "Global-e, a leading B2B SaaS cross-border e-commerce enablement company, is hiring a Senior Demand Generation Manager to drive pipeline and revenue through B2B marketing programs. The role spans demand generation, campaign management, and marketing operations functions closely tied to revenue goals within a high-growth global SaaS environment. Based in the Tel Aviv area (Petach Tikva) with hybrid flexibility. Candidates should verify exact responsibilities and requirements directly via the company's official careers page, as this aggregated listing reflects a recently posted opening on Secret Tel Aviv's job board.", "fit_score": 6, "score_reason": "Strong location match and relevant B2B SaaS/marketing ops crossover, but the role is primarily demand generation/campaign management rather than core RevOps or GTM strategy leadership that aligns with Omri's senior executive positioning. Good stepping stone or lateral move, not ideal for a Head of Revenue Operations track.", "ai_opener": "Hi [Hiring Manager], I noticed Global-e is scaling their B2B demand generation function—I've spent 15+ years building revenue operations and GTM strategies for high-growth SaaS companies, with deep experience operationalizing pipeline generation and tying marketing metrics directly to revenue outcomes. Given the marketing ops adjacency in this role, I'd be interested in exploring how my background in sales/marketing alignment and forecasting could help Global-e accelerate cross-border SaaS expansion.", "location_ok": true, "contact": null}];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const NOW=new Date();
let currentFilter="all";
function badgeClass(s){return s>=8?"score-green":s>=5?"score-amber":"score-red";}
function filterVal(s){return s>=8?"high":s>=5?"mid":"low";}
function postedLabel(d){
  if(!d) return "";
  const dt=new Date(d);
  if(isNaN(dt)) return "";
  const days=Math.round((NOW-dt)/86400000);
  let rel = days<=0?"today":days===1?"1 day ago":days+" days ago";
  return MONTHS[dt.getMonth()]+" "+dt.getDate()+" · "+rel;
}
function initials(name){return name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();}
function render(){
  const sorted=[...JOBS].sort((a,b)=>b.fit_score-a.fit_score);
  let v=0;
  document.getElementById("container").innerHTML=sorted.map((j,i)=>{
    const fv=filterVal(j.fit_score);
    const show=currentFilter==="all"||fv===currentFilter;
    if(show)v++;
    const c=j.contact;
    const contactHTML=c?`
      <div class="contact-box">
        <div class="contact-head">👤 Who to contact · via Clay</div>
        <div class="contact-main">
          <div class="avatar">${initials(c.name)}</div>
          <div class="contact-info">
            <div class="contact-name">${c.name}</div>
            <div class="contact-title">${c.title}</div>
          </div>
        </div>
        <div class="contact-links">
          ${c.email?`<a class="clink em" href="mailto:${c.email}">✉️ ${c.email}</a>`:""}
          ${c.linkedin?`<a class="clink li" href="${c.linkedin}" target="_blank" rel="noopener">in LinkedIn</a>`:""}
        </div>
      </div>`:"";
    return `<div class="job-card" data-filter="${fv}" style="display:${show?"":"none"}">
      <div class="card-row1">
        <div class="score-badge ${badgeClass(j.fit_score)}"><span class="num">${j.fit_score}</span><span class="lbl">fit</span></div>
        <div class="card-title-block">
          <div class="card-company">${j.company}</div>
          <div class="card-role">${j.title}</div>
        </div>
      </div>
      <div class="card-tags">
        ${j.posted?`<span class="tag date">🗓️ ${postedLabel(j.posted)}</span>`:""}
        ${j.location?`<span class="tag">📍 ${j.location}</span>`:""}
        ${j.job_type?`<span class="tag">${j.job_type}</span>`:""}
      </div>
      ${j.score_reason?`<div class="card-reason">${j.score_reason}</div>`:""}
      ${contactHTML}
      <div class="card-actions">
        <a href="${j.url}" target="_blank" rel="noopener" class="btn btn-view">View Job ↗</a>
        <button class="btn btn-copy" onclick='copyOpener(this,${i})'>Copy Opener 📋</button>
        <button class="btn btn-wa" onclick='shareWA(${i})'>WhatsApp</button>
      </div>
    </div>`;
  }).join("");
  document.getElementById("count").textContent=v+" job"+(v!==1?"s":"");
  window._sorted=sorted;
}
function setFilter(e,f){
  currentFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  render();
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
function copyOpener(btn,i){
  const j=window._sorted[i];const text=j.ai_opener||"";
  if(!text){showToast("No opener");return;}
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="Copied! ✓";btn.classList.add("copied");showToast("Opener copied!");
    setTimeout(()=>{btn.textContent="Copy Opener 📋";btn.classList.remove("copied");},2000);
  }).catch(()=>showToast("Copy failed"));
}
function shareWA(i){
  const j=window._sorted[i];const c=j.contact;
  let msg=`🎯 *${j.company}* — ${j.title}\n`;
  msg+=`Fit ${j.fit_score}/10 · 📍 ${j.location}\n`;
  if(j.posted) msg+=`Posted: ${postedLabel(j.posted)}\n`;
  if(c) msg+=`Contact: ${c.name}, ${c.title}${c.email?" ("+c.email+")":""}\n`;
  msg+=`\n${j.url}`;
  window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");
}
render();
</script>
</body>
</html>
