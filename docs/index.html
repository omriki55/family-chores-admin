<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎯 Job Tracker — Omri</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f1117;--card:#1e2130;--accent:#00c853;--text:#e0e0e0;--muted:#8a8fa8;--yellow:#ffd600;--red:#f44336;--border:#2a2d3e;--radius:12px}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding-bottom:40px}
    header{background:#131620;border-bottom:1px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:100}
    .header-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
    header h1{font-size:1.25rem;font-weight:700;color:var(--accent)}
    .header-meta{font-size:0.72rem;color:var(--muted);margin-top:2px}
    .filter-bar{display:flex;gap:8px;padding:12px 16px 0;flex-wrap:wrap}
    .filter-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 14px;font-size:.8rem;cursor:pointer;transition:all .15s}
    .filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
    .count-label{font-size:.75rem;color:var(--muted);padding:8px 16px 0}
    .jobs-container{padding:12px 16px 0;display:flex;flex-direction:column;gap:10px}
    .job-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:8px}
    .card-row1{display:flex;align-items:flex-start;gap:12px}
    .score-badge{flex-shrink:0;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:800}
    .score-green{background:rgba(0,200,83,.18);color:var(--accent);border:1.5px solid rgba(0,200,83,.35)}
    .score-yellow{background:rgba(255,214,0,.15);color:var(--yellow);border:1.5px solid rgba(255,214,0,.3)}
    .score-red{background:rgba(244,67,54,.15);color:var(--red);border:1.5px solid rgba(244,67,54,.3)}
    .card-title-block{flex:1;min-width:0}
    .card-company{font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-role{font-size:.82rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-tags{display:flex;flex-wrap:wrap;gap:6px}
    .tag{background:#1a1d2e;border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:.73rem;color:var(--muted)}
    .card-reason{font-size:.8rem;color:var(--muted);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-actions{display:flex;gap:8px;margin-top:2px}
    .btn-view,.btn-copy{flex:1;padding:9px 0;border-radius:8px;font-size:.82rem;font-weight:600;text-align:center;cursor:pointer;border:none;transition:opacity .15s}
    .btn-view{background:rgba(0,200,83,.12);color:var(--accent);border:1px solid rgba(0,200,83,.3);text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px}
    .btn-copy{background:rgba(138,143,168,.12);color:var(--muted);border:1px solid var(--border)}
    .btn-copy.copied{color:var(--accent);border-color:rgba(0,200,83,.4)}
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#2a2d3e;color:var(--text);border:1px solid var(--border);border-radius:24px;padding:10px 20px;font-size:.85rem;z-index:999;transition:transform .3s ease;pointer-events:none}
    #toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <div>
      <h1>🎯 Job Tracker</h1>
      <div class="header-meta">Last updated: Jun 03, 2026</div>
    </div>
    <a href="https://docs.google.com/spreadsheets/d/1i33qr_r_xj_2LkHzg0Hxe5Dh4G_m4T21Xa4WNhQLkjg/edit" target="_blank" style="background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 12px;font-size:.8rem;text-decoration:none">📊 Sheet</a>
  </div>
</header>
<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter(event,'all')">All</button>
  <button class="filter-btn" onclick="setFilter(event,'high')">🟢 8+</button>
  <button class="filter-btn" onclick="setFilter(event,'mid')">🟡 5–7</button>
</div>
<div class="count-label" id="count"></div>
<div class="jobs-container" id="container"></div>
<div id="toast"></div>
<script>
const JOBS=[{"company": "Finout", "title": "Head of Revenue Operations", "location": "Tel Aviv, Israel (+ New York)", "url": "https://www.builtinnyc.com/job/head-revenue-operations/8178347", "job_type": "Full-time", "description": "Cloud cost management B2B SaaS company. Build and scale the operational backbone of the GTM engine. Own Revenue Operations across Sales, Marketing, Finance and HR, manage a team, optimize the RevOps tech stack. Requires 7+ years in Revenue Operations / Sales Ops / Strategy in high-growth B2B SaaS, scaling revenue operations beyond $30M+ ARR.", "fit_score": 9, "score_reason": "Exceptional match across all dimensions: 15+ years exceeds 7+ requirement, Head of RevOps role directly aligns with target positions, B2B SaaS and scaling experience proven, cloud/fintech adjacent (cost management) fits expertise. Only minor gap is no explicit mention of Finout experience, but profile is nearly perfect otherwise.", "ai_opener": "Omri, I came across Finout's Head of Revenue Operations opening and immediately thought of you—building the operational backbone for a cloud cost management platform at scale is exactly the kind of GTM infrastructure challenge that plays to your strengths. With 15+ years architecting RevOps in high-growth B2B SaaS and a proven track record scaling revenue operations well beyond $30M ARR, you'd be uniquely positioned to own the Sales, Marketing, Finance, and HR alignment that separates category leaders from the rest. The intersection of fintech adjacency and AI-native GTM optimization in Finout's space seems like it could be a compelling next chapter for you.", "location_ok": true}, {"company": "Infisical", "title": "GTM Engineer", "location": "Remote (US)", "url": "https://www.remoterocketship.com/us/company/infisical/jobs/gtm-engineer-united-states-remote/", "job_type": "Full-time", "description": "High-growth B2B SaaS (developer security / secrets management). Seeks 5+ years in GTM/revenue/sales operations or enablement at a B2B SaaS company with hands-on administration of a modern GTM stack including HubSpot and Salesforce. Build automations, data integration and revenue infrastructure.", "fit_score": 9, "score_reason": "Exceptional match across all dimensions: GTM Engineer role aligns perfectly with RevOps expertise, 15+ years exceeds 5+ year requirement, HubSpot/Salesforce admin skills directly applicable, and B2B SaaS background matches. Developer security/secrets management vertical is strong fit for AI-native GTM focus.", "ai_opener": "Hi Infisical team—I've spent 15+ years building GTM infrastructure at B2B SaaS companies, with deep hands-on experience in HubSpot and Salesforce automation, data integration, and revenue operations. Your GTM Engineer role resonates strongly, especially given the developer-first positioning of secrets management; I've built similar infrastructure for security and infrastructure-focused companies and understand the unique sales/technical buyer dynamics. I'd love to explore how I can help scale your revenue operations.", "location_ok": true}, {"company": "Supabase", "title": "GTM Engineer", "location": "Remote (Global)", "url": "https://www.remotenomadjobs.com/remote-jobs/gtm-engineer-69fff89b16adf06a3563a528", "job_type": "Full-time", "description": "Open-source developer platform, B2B SaaS. Requires 3+ years GTM Engineering at a B2B SaaS company; comfort with HubSpot APIs, SQL/BigQuery, and automations with Python or Node.js. AI-native GTM automation focus.", "fit_score": 9, "score_reason": "Exceptional match: 15+ years B2B SaaS experience exceeds 3+ year requirement; GTM Engineer role aligns perfectly with RevOps background; AI-native GTM automation and HubSpot API expertise are core strengths. Only minor gap: may need to strengthen SQL/BigQuery or Python skills if not recently hands-on.", "ai_opener": "Hi [Hiring Manager], I've spent 15 years building GTM engines at scale in B2B SaaS—including designing HubSpot API automations and pipeline forecasting systems that directly parallel Supabase's need for AI-native GTM automation. Your focus on developer-first growth resonates with how I've approached RevOps: building self-service, data-driven systems that scale without proportional headcount. I'd love to explore how I can help Supabase automate and optimize your GTM motion.", "location_ok": true}, {"company": "WorkOS", "title": "GTM Engineer", "location": "Remote (US)", "url": "https://www.remoterocketship.com/us/company/workos-2/jobs/gtm-engineer-united-states-remote/", "job_type": "Full-time", "description": "Enterprise-ready B2B SaaS (auth / SSO for developers). Requires 3+ years in GTM Engineering, Revenue Operations, or a closely adjacent technical role at a high-growth B2B SaaS company. Build revenue infrastructure across the GTM stack.", "fit_score": 9, "score_reason": "Excellent alignment with GTM Engineer role, B2B SaaS developer platform focus, and revenue infrastructure expertise. 15+ years in RevOps/GTM exceeds the 3+ year requirement, and remote US location matches candidate's global remote flexibility.", "ai_opener": "Hi there – I've spent 15+ years building revenue infrastructure at B2B SaaS companies, and WorkOS's approach to enterprise-ready auth/SSO resonates with me. The GTM Engineer role aligns perfectly with my background scaling RevOps systems across the full stack, and I'm excited about the opportunity to help developer-first companies nail their enterprise GTM motion.", "location_ok": true}, {"company": "UTTR", "title": "Revenue Operations Manager", "location": "Remote (Global)", "url": "https://weworkremotely.com/remote-jobs/uttr-revenue-operations-manager", "job_type": "Full-time", "description": "Fully remote B2B team. Revenue Operations Manager requiring HubSpot and Salesforce skills. Own pipeline operations, reporting, forecasting and GTM tooling. Work from anywhere.", "fit_score": 9, "score_reason": "Excellent match on all core dimensions: RevOps Manager role aligns perfectly with Omri's target titles, HubSpot/Salesforce expertise, B2B SaaS pipeline/forecasting/GTM tooling ownership are direct strengths. Remote global setup removes any location constraints.", "ai_opener": "Hi UTTR team - I noticed you're building out Revenue Operations with a focus on pipeline, forecasting, and GTM tooling. With 15+ years scaling B2B SaaS revenue stacks (HubSpot, Salesforce, predictive forecasting), I've spent the last decade doing exactly this kind of work - owning the systems and processes that connect sales, marketing, and growth. The fully remote setup is perfect for my workflow. I'd love to explore how I can help you scale your revenue engine.", "location_ok": true}, {"company": "GTM Base", "title": "Senior GTM Engineer", "location": "Remote (Global)", "url": "https://join.com/companies/gtmbaseio/15983148-senior-gtm-engineer", "job_type": "Contract (path to full-time)", "description": "Design and build GTM systems including data enrichment pipelines, lead scoring models, and routing logic, with Clay as the primary platform. AI-native agentic automation across the GTM stack. Contract role with path to full-time.", "fit_score": 8, "score_reason": "Strong alignment with GTM Engineer role, AI-native automation expertise, and RevOps background make this ideal. Contract-to-FTE path and remote location are perfect matches; only minor gap is Clay platform specificity vs. broader Salesforce/HubSpot stack.", "ai_opener": "Hi GTM Base team - I'm a 15+ year B2B SaaS RevOps executive who's built data enrichment and lead scoring engines from scratch across HubSpot and Salesforce ecosystems. Your AI-native agentic automation approach resonates deeply with how I think about modern GTM infrastructure, and I'm excited about designing systems that actually scale beyond manual workflows.", "location_ok": true}];
let currentFilter="all";
function badgeClass(s){return s>=8?"score-green":s>=5?"score-yellow":"score-red";}
function filterVal(s){return s>=8?"high":s>=5?"mid":"low";}
function render(){
  const sorted=[...JOBS].sort((a,b)=>b.fit_score-a.fit_score);
  let v=0;
  document.getElementById("container").innerHTML=sorted.map(j=>{
    const fv=filterVal(j.fit_score);
    const show=currentFilter==="all"||fv===currentFilter;
    if(show)v++;
    return `<div class="job-card" data-filter="${fv}" style="display:${show?"":"none"}">
      <div class="card-row1">
        <div class="score-badge ${badgeClass(j.fit_score)}">${j.fit_score}</div>
        <div class="card-title-block">
          <div class="card-company">${j.company}</div>
          <div class="card-role">${j.title}</div>
        </div>
      </div>
      <div class="card-tags">
        ${j.location?`<span class="tag">📍 ${j.location}</span>`:""}
        ${j.job_type?`<span class="tag">${j.job_type}</span>`:""}
      </div>
      ${j.score_reason?`<div class="card-reason">${j.score_reason}</div>`:""}
      <div class="card-actions">
        <a href="${j.url}" target="_blank" rel="noopener" class="btn-view">View Job ↗</a>
        <button class="btn-copy" onclick="copyOpener(this,${JSON.stringify(j.ai_opener||'')})">Copy Opener 📋</button>
      </div>
    </div>`;
  }).join("");
  document.getElementById("count").textContent=v+" job"+(v!==1?"s":"");
}
function setFilter(e,f){
  currentFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");
  let v=0;
  document.querySelectorAll(".job-card").forEach(c=>{
    const show=f==="all"||c.dataset.filter===f;
    c.style.display=show?"":"none";
    if(show)v++;
  });
  document.getElementById("count").textContent=v+" job"+(v!==1?"s":"");
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}
function copyOpener(btn,text){
  if(!text){showToast("No opener");return;}
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="Copied! ✓";btn.classList.add("copied");showToast("Opener copied!");
    setTimeout(()=>{btn.textContent="Copy Opener 📋";btn.classList.remove("copied");},2000);
  }).catch(()=>showToast("Copy failed"));
}
render();
</script>
</body>
</html>
