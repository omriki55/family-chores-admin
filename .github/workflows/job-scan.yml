name: SaaS Job Scan
permissions:
  contents: read
on:
  workflow_dispatch:
  schedule:
    # 3x daily, Sunday–Thursday (Israeli work week), UTC times
    - cron: '0 5 * * 0-4'    # 08:00 Israel
    - cron: '0 10 * * 0-4'   # 13:00 Israel
    - cron: '0 15 * * 0-4'   # 18:00 Israel
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic
      - run: python job_search/saas_pipeline.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
